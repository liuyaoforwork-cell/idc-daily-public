<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IDC 行业情报周报 · 归档站</title>
<meta name="description" content="IDC数据中心行业情报周报归档站，覆盖重大信号、项目市场、技术趋势、政策法规、供应链动态。">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏢</text></svg>">
<style>
  :root {
    --bg: #0f1117; --bg2: #161824; --card: #1a1d2e; --card-hover: #222640;
    --border: #2a2e45; --text: #e2e4ed; --text2: #8b8fa3; --text3: #5a5e73;
    --blue: #4d9fff; --red: #ff4d6a; --green: #34d399; --purple: #a78bfa;
    --orange: #ff8c42; --cyan: #22d3ee; --yellow: #fbbf24; --pink: #f472b6;
    --grad: linear-gradient(135deg, #1e1b4b 0%, #0f1117 50%, #0c1524 100%);
  }
  [data-theme="light"] {
    --bg: #f8f9fc; --bg2: #fff; --card: #fff; --card-hover: #f0f4ff;
    --border: #e2e6f0; --text: #1a1d2e; --text2: #5a5e73; --text3: #8b8fa3;
    --grad: linear-gradient(135deg, #e8e6f8 0%, #f8f9fc 50%, #e8f0f8 100%);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: var(--bg); color: var(--text); line-height:1.7; -webkit-font-smoothing:antialiased;
    transition: background .3s, color .3s;
  }
  a { color: var(--blue); text-decoration: none; }

  /* ── Top bar ── */
  .topbar {
    position: sticky; top:0; z-index:100;
    background: rgba(15,17,23,.85); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border); padding:0 24px; height:56px;
    display:flex; align-items:center; justify-content:space-between;
    transition: background .3s;
  }
  [data-theme="light"] .topbar { background: rgba(248,249,252,.88); }
  .topbar-brand { display:flex; align-items:center; gap:10px; font-weight:700; font-size:15px; }
  .topbar-brand span { font-size:20px; }
  .topbar-actions { display:flex; align-items:center; gap:12px; }
  .theme-toggle {
    width:36px; height:36px; border-radius:10px; border:1px solid var(--border);
    background:transparent; color:var(--text); cursor:pointer; font-size:16px;
    display:flex; align-items:center; justify-content:center; transition:all .2s;
  }
  .theme-toggle:hover { background:var(--card-hover); border-color:var(--blue); }

  /* ── Hero ── */
  .hero {
    background: var(--grad); border-bottom:1px solid var(--border);
    padding:72px 24px 56px; text-align:center; position:relative; overflow:hidden;
  }
  .hero::before {
    content:''; position:absolute; top:-50%; left:-50%; width:200%; height:200%;
    background: radial-gradient(circle at 30% 40%, rgba(77,159,255,.06) 0%, transparent 60%),
                radial-gradient(circle at 70% 60%, rgba(167,139,250,.05) 0%, transparent 60%);
    animation: drift 25s linear infinite;
  }
  @keyframes drift { from{transform:rotate(0)} to{transform:rotate(360deg)} }
  .hero-inner { position:relative; z-index:1; max-width:720px; margin:0 auto; }
  .hero-badge {
    display:inline-block; background:rgba(77,159,255,.12); color:var(--blue);
    font-size:12px; font-weight:700; padding:5px 14px; border-radius:20px;
    border:1px solid rgba(77,159,255,.2); letter-spacing:1.5px; margin-bottom:20px;
  }
  .hero h1 {
    font-size:clamp(28px,5vw,42px); font-weight:800; letter-spacing:-1px; margin-bottom:14px;
    background:linear-gradient(135deg,#fff 0%,#a0aec0 100%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  }
  [data-theme="light"] .hero h1 {
    background:linear-gradient(135deg,#1a1d2e 0%,#4a5568 100%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  }
  .hero-desc { color:var(--text2); font-size:16px; max-width:520px; margin:0 auto 28px; }
  .hero-stats {
    display:flex; justify-content:center; gap:40px; flex-wrap:wrap;
  }
  .stat-item { text-align:center; }
  .stat-num { font-size:32px; font-weight:800; color:var(--text); }
  .stat-num small { font-size:14px; color:var(--text2); font-weight:500; }
  .stat-label { font-size:12px; color:var(--text3); margin-top:2px; }

  /* ── Search ── */
  .search-section { max-width:640px; margin:-28px auto 0; position:relative; z-index:10; padding:0 24px; }
  .search-box {
    display:flex; align-items:center; gap:10px;
    background:var(--card); border:1px solid var(--border); border-radius:14px;
    padding:12px 18px; box-shadow:0 8px 32px rgba(0,0,0,.15); transition:all .2s;
  }
  .search-box:focus-within { border-color:var(--blue); box-shadow:0 8px 32px rgba(77,159,255,.12); }
  .search-box svg { flex-shrink:0; color:var(--text3); }
  .search-box input {
    flex:1; border:none; background:transparent; color:var(--text);
    font-size:15px; outline:none; font-family:inherit;
  }
  .search-box input::placeholder { color:var(--text3); }
  .search-count { text-align:center; margin-top:12px; font-size:13px; color:var(--text3); }

  /* ── Issues grid ── */
  .issues { max-width:960px; margin:40px auto 0; padding:0 24px 80px; }
  .issues-header {
    display:flex; align-items:center; justify-content:space-between; margin-bottom:20px;
  }
  .issues-title { font-size:18px; font-weight:700; }
  .issues-sort {
    font-size:13px; color:var(--text2); background:transparent; border:1px solid var(--border);
    padding:5px 12px; border-radius:8px; cursor:pointer; color:var(--text); font-family:inherit;
  }
  .issues-grid { display:grid; grid-template-columns:1fr; gap:16px; }

  .issue-card {
    display:grid; grid-template-columns:100px 1fr auto; align-items:start; gap:20px;
    background:var(--card); border:1px solid var(--border); border-radius:16px;
    padding:24px; transition:all .25s; cursor:pointer; text-decoration:none; color:inherit;
  }
  .issue-card:hover { background:var(--card-hover); border-color:rgba(77,159,255,.3); transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,0,0,.1); }

  .issue-date-col { text-align:center; }
  .issue-month { font-size:13px; color:var(--blue); font-weight:600; text-transform:uppercase; }
  .issue-day { font-size:32px; font-weight:800; line-height:1.1; }
  .issue-year { font-size:12px; color:var(--text3); }

  .issue-info { min-width:0; }
  .issue-title { font-size:17px; font-weight:700; margin-bottom:6px; line-height:1.4; }
  .issue-meta { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:8px; }
  .issue-tag {
    font-size:11px; font-weight:600; padding:2px 8px; border-radius:6px;
    letter-spacing:.3px;
  }
  .tag-intel { background:rgba(77,159,255,.12); color:var(--blue); }
  .tag-amount { background:rgba(52,211,153,.12); color:var(--green); }
  .tag-sections { background:rgba(167,139,250,.12); color:var(--purple); }
  .issue-summary { font-size:14px; color:var(--text2); line-height:1.6; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }

  .issue-arrow {
    color:var(--text3); font-size:20px; padding-top:8px; transition:color .2s;
  }
  .issue-card:hover .issue-arrow { color:var(--blue); }

  .no-results {
    text-align:center; padding:60px 20px; color:var(--text3); font-size:15px;
  }
  .no-results span { font-size:48px; display:block; margin-bottom:12px; }

  /* ── Footer ── */
  .footer {
    text-align:center; padding:32px 24px; border-top:1px solid var(--border);
    color:var(--text3); font-size:13px; line-height:1.8;
  }

  /* ── Responsive ── */
  @media (max-width:640px) {
    .hero { padding:56px 16px 44px; }
    .hero-stats { gap:24px; }
    .stat-num { font-size:24px; }
    .search-section { margin-top:-22px; padding:0 16px; }
    .issues { padding:32px 16px 60px; }
    .issue-card { grid-template-columns:1fr; gap:12px; }
    .issue-date-col { text-align:left; display:flex; align-items:center; gap:8px; }
    .issue-day { font-size:20px; }
    .issue-arrow { display:none; }
  }
</style>
</head>
<body>

<!-- Top Bar -->
<nav class="topbar">
  <div class="topbar-brand">
    <span>🏢</span> IDC Intel Archive
  </div>
  <div class="topbar-actions">
    <a href="https://github.com/liuyaoforwork-cell/idc-daily-public" target="_blank" style="color:var(--text2);font-size:13px;">GitHub</a>
    <button class="theme-toggle" onclick="toggleTheme()" title="切换主题" id="themeBtn">🌙</button>
  </div>
</nav>

<!-- Hero -->
<header class="hero">
  <div class="hero-inner">
    <div class="hero-badge">IDC INDUSTRY INTEL · ARCHIVE</div>
    <h1>IDC 行业情报周报</h1>
    <p class="hero-desc">持续追踪数据中心行业动态，覆盖重大信号、项目市场、技术趋势、政策法规、供应链与招投标。</p>
    <div class="hero-stats">
      <div class="stat-item">
        <div class="stat-num" id="totalIssues">1</div>
        <div class="stat-label">已发布期刊</div>
      </div>
      <div class="stat-item">
        <div class="stat-num" id="totalIntel">12</div>
        <div class="stat-label">累计情报条数</div>
      </div>
      <div class="stat-item">
        <div class="stat-num">8<small> 大板块</small></div>
        <div class="stat-label">覆盖领域</div>
      </div>
    </div>
  </div>
</header>

<!-- Search -->
<div class="search-section">
  <div class="search-box">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="searchInput" placeholder="搜索关键词… 如「液冷」「招投标」「英伟达」" oninput="filterIssues()">
  </div>
  <div class="search-count" id="searchCount"></div>
</div>

<!-- Issues List -->
<section class="issues">
  <div class="issues-header">
    <h2 class="issues-title">📚 所有期刊</h2>
  </div>
  <div class="issues-grid" id="issuesGrid"></div>
  <div class="no-results" id="noResults" style="display:none;">
    <span>🔍</span>
    没有找到匹配的期刊
  </div>
</section>

<footer class="footer">
  <p>本站基于公开信息整理，不构成投资建议。转载请注明出处。</p>
  <p style="margin-top:4px;">Powered by IDC Industry Intel · <a href="https://github.com/liuyaoforwork-cell/idc-daily-public">Open Source</a></p>
</footer>

<script>
// ── Issues Data ──
// Each new report appends an entry here. The build script auto-updates this array.
const ISSUES = [
  {
    id: "2026-03-30",
    date: "2026-03-30",
    dateRange: "2026.03.28 — 03.30",
    title: "豫能控股94亿算电协同 · GTC Vera Rubin全液冷 · 呼和浩特52亿EPC",
    intelCount: 12,
    totalAmount: "60.99亿",
    sections: 8,
    tags: ["液冷", "800VDC", "算电协同", "东数西算", "招投标", "深圳AI政策", "CDU", "国产替代"],
    summary: "豫能控股11亿跨界数据中心、英伟达GTC 2026 Vera Rubin全液冷标配、中国移动呼和浩特52.44亿EPC定标、深圳AI服务器三年行动计划、2MW CDU竞争焦点、高盛供需研报。",
    file: "issues/2026-03-30.html"
  }
];

// ── Render ──
const grid = document.getElementById('issuesGrid');
const noResults = document.getElementById('noResults');
const searchCount = document.getElementById('searchCount');

function renderIssues(list) {
  if (list.length === 0) {
    grid.innerHTML = '';
    noResults.style.display = 'block';
    searchCount.textContent = '无匹配结果';
    return;
  }
  noResults.style.display = 'none';
  const q = document.getElementById('searchInput').value.trim();
  searchCount.textContent = q ? `找到 ${list.length} 期相关结果` : '';

  grid.innerHTML = list.map(issue => {
    const d = new Date(issue.date + 'T00:00:00');
    const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
    return `
      <a class="issue-card" href="${issue.file}">
        <div class="issue-date-col">
          <div class="issue-month">${months[d.getMonth()]}</div>
          <div class="issue-day">${d.getDate()}</div>
          <div class="issue-year">${d.getFullYear()}</div>
        </div>
        <div class="issue-info">
          <div class="issue-title">${issue.title}</div>
          <div class="issue-meta">
            <span class="issue-tag tag-intel">${issue.intelCount} 条情报</span>
            <span class="issue-tag tag-amount">¥ ${issue.totalAmount}</span>
            <span class="issue-tag tag-sections">${issue.sections} 板块</span>
          </div>
          <div class="issue-summary">${issue.summary}</div>
        </div>
        <div class="issue-arrow">→</div>
      </a>
    `;
  }).join('');
}

function filterIssues() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  if (!q) { renderIssues(ISSUES); return; }
  const filtered = ISSUES.filter(i =>
    i.title.toLowerCase().includes(q) ||
    i.summary.toLowerCase().includes(q) ||
    i.tags.some(t => t.toLowerCase().includes(q)) ||
    i.dateRange.includes(q)
  );
  renderIssues(filtered);
}

// Init
document.getElementById('totalIssues').textContent = ISSUES.length;
document.getElementById('totalIntel').textContent = ISSUES.reduce((s,i) => s + i.intelCount, 0);
renderIssues(ISSUES);

// ── Theme ──
function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') !== 'light';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.getElementById('themeBtn').textContent = isDark ? '☀️' : '🌙';
  localStorage.setItem('idc-theme', isDark ? 'light' : 'dark');
}
(function initTheme() {
  const saved = localStorage.getItem('idc-theme');
  if (saved === 'light') {
    document.documentElement.setAttribute('data-theme', 'light');
    document.getElementById('themeBtn').textContent = '☀️';
  }
})();
</script>
</body>
</html>
