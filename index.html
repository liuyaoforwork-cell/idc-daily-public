    --shadow-card: 0 2px 12px rgba(0,0,0,.06);
    --shadow-hover: 0 8px 24px rgba(0,0,0,.08);

  .topbar-actions { display:flex; align-items:center; gap:12px; }

  /* ── Theme Switcher ── */
  .theme-switcher {

    border-radius:10px; overflow:hidden; height:36px; font-size:13px; font-weight:600;
  }
  .theme-opt {
    padding:0 14px; height:100%; display:flex; align-items:center; gap:5px;
    cursor:pointer; color:var(--text3); transition:all .2s; border:none; background:transparent;
    font-family:inherit; font-size:13px; font-weight:600; white-space:nowrap;
  }
  .theme-opt:hover { color:var(--text2); }
  .theme-opt.active {

    padding:56px 24px 48px; text-align:center; position:relative; overflow:hidden;
  }

    content:''; position:absolute; top:-50%; left:-50%; width:200%; height:200%;
    background: radial-gradient(circle at 30% 40%, rgba(77,159,255,.06) 0%, transparent 60%),

  .hero-inner { position:relative; z-index:1; max-width:720px; margin:0 auto; }
  .hero-badge {
    display:inline-block; background:rgba(77,159,255,.12); color:var(--blue);

  }

    background:linear-gradient(135deg,#fff 0%,#a0aec0 100%);

  }

  .stat-label { font-size:12px; color:var(--text3); margin-top:2px; }

  .search-clear {
    display:none; width:24px; height:24px; border-radius:6px; border:none;
    background:var(--border); color:var(--text2); cursor:pointer; font-size:14px;
    align-items:center; justify-content:center; transition:all .2s; flex-shrink:0;

  .search-count { text-align:center; margin-top:12px; font-size:13px; color:var(--text3); min-height:20px; }

  }
  .search-tab {
    font-size:12px; font-weight:600; padding:5px 14px; border-radius:8px;

  /* ── Issues list ── */
  .content { max-width:960px; margin:24px auto 0; padding:0 24px 80px; }

  .issue-card {
    display:grid; grid-template-columns:100px 1fr auto; align-items:start; gap:20px;

  .issue-date-col { text-align:center; }
  .issue-month { font-size:13px; color:var(--blue); font-weight:600; text-transform:uppercase; }
  .issue-day { font-size:32px; font-weight:800; line-height:1.1; }
  .issue-year { font-size:12px; color:var(--text3); }

    .issue-day { font-size:20px; }
    .issue-arrow { display:none; }
    .theme-switcher { font-size:12px; }
    .theme-opt { padding:0 10px; }
    .intel-card { padding:16px; }

// THEME
// ══════════════════════════════════════════════
function setTheme(theme) {
  if (theme === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
  } else {
    document.documentElement.removeAttribute('data-theme');
  }
  localStorage.setItem('idc-theme', theme);
  updateThemeSwitcher(theme);
}

function updateThemeSwitcher(theme) {
  document.querySelectorAll('.theme-opt').forEach(function(btn) {
    btn.classList.toggle('active', btn.dataset.theme === theme);
  });
}

function getCurrentTheme() {
  return localStorage.getItem('idc-theme') || 'light';
}

// Apply immediately
(function() {
  var theme = getCurrentTheme();
  if (theme === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
  }
  // light = no attribute = :root defaults
  updateThemeSwitcher(theme);
})();

// ══════════════════════════════════════════════
// RENDER: Latest Issue (最新一期完整内容)
// ══════════════════════════════════════════════
function renderLatestIssue() {
  var latestSection = document.getElementById('latestSection');
  if (ISSUES.length === 0 || INTEL_ITEMS.length === 0) {
    latestSection.style.display = 'none';
    return;
  }

  var latest = ISSUES[0];
  document.getElementById('latestTitle').textContent = '📢 ' + latest.title;
  document.getElementById('latestDate').textContent = latest.dateRange + ' · ' + latest.intelCount + ' 条情报 · 涉及金额 ¥' + latest.totalAmount;
  document.getElementById('latestLink').href = latest.file;

  // 按板块分组
  var items = INTEL_ITEMS.filter(function(i) { return i.issueId === latest.id; });
  var sectionOrder = ['重大','项目','技术','政策','供应链','观点','招投标','数据'];
  var groups = {};
  items.forEach(function(item) {
    if (!groups[item.section]) {
      groups[item.section] = { name: item.sectionName || item.section, items: [] };
    }
    groups[item.section].items.push(item);
  });

  var html = '';
  sectionOrder.forEach(function(sec) {
    if (!groups[sec]) return;
    var g = groups[sec];
    html += '<div class="sec-group">';
    html += '<div class="sec-group-header">';
    html += '<span class="sec-group-badge badge-' + sec + '">' + sec + '</span>';
    html += '<span class="sec-group-name">' + g.name + '</span>';
    html += '<span class="sec-group-count">' + g.items.length + ' 条</span>';
    html += '</div>';

    g.items.forEach(function(item) {
      var insightHtml = item.insight
        ? '<div class="intel-insight">💡 ' + item.insight + '</div>' : '';
      var sourceHtml = '';
      if (item.sourceUrl) {
        sourceHtml = '<div class="intel-source">📎 <a href="' + item.sourceUrl + '" target="_blank">' + item.sourceLabel + '</a></div>';
      } else if (item.sourceLabel) {
        sourceHtml = '<div class="intel-source" style="color:var(--text3);">📎 ' + item.sourceLabel + '</div>';
      }
      var tagsHtml = item.tags.map(function(t) {
        return '<span class="intel-tag">' + t + '</span>';
      }).join('');

      html += '<div class="intel-card">';
      html += '<div class="intel-card-header">';
      html += '<span class="intel-badge badge-' + item.section + '">' + item.section + '</span>';
      html += '<div class="intel-title">' + item.title + '</div>';
      html += '</div>';
      html += '<div class="intel-body">' + item.body + '</div>';
      html += insightHtml;
      html += '<div class="intel-footer">';
      html += sourceHtml;
      html += '<div class="intel-tags">' + tagsHtml + '</div>';
      html += '</div>';
      html += '</div>';
    });

    html += '</div>';
  });

  document.getElementById('latestContent').innerHTML = html;
}

// ══════════════════════════════════════════════
// RENDER: Issues list
// ══════════════════════════════════════════════
var grid = document.getElementById('issuesGrid');
var intelResults = document.getElementById('intelResults');
var noResults = document.getElementById('noResults');
var noResultsText = document.getElementById('noResultsText');
var searchCount = document.getElementById('searchCount');
var searchClear = document.getElementById('searchClear');
var searchTabs = document.getElementById('searchTabs');
var contentTitle = document.getElementById('contentTitle');

function renderIssues(list) {
  intelResults.style.display = 'none';
  grid.style.display = 'grid';
  if (list.length === 0) {
    grid.innerHTML = '';
    noResults.style.display = 'block';
    noResultsText.textContent = '没有找到匹配的期刊';
    return;
  }
  noResults.style.display = 'none';
  grid.innerHTML = list.map(function(issue) {
    var d = new Date(issue.date + 'T00:00:00');
    var months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
    return '<a class="issue-card" href="' + issue.file + '">' +
      '<div class="issue-date-col">' +
        '<div class="issue-month">' + months[d.getMonth()] + '</div>' +
        '<div class="issue-day">' + d.getDate() + '</div>' +
        '<div class="issue-year">' + d.getFullYear() + '</div>' +
      '</div>' +
      '<div class="issue-info">' +
        '<div class="issue-title">' + issue.title + '</div>' +
        '<div class="issue-meta">' +
          '<span class="issue-tag tag-intel">' + issue.intelCount + ' 条情报</span>' +
          '<span class="issue-tag tag-amount">¥ ' + issue.totalAmount + '</span>' +
          '<span class="issue-tag tag-sections">' + issue.sections + ' 板块</span>' +
        '</div>' +
        '<div class="issue-summary">' + issue.summary + '</div>' +
      '</div>' +
      '<div class="issue-arrow">→</div>' +
    '</a>';
  }).join('');
}

// ══════════════════════════════════════════════
// SEARCH
// ══════════════════════════════════════════════
var searchMode = 'intel';
var currentQuery = '';

function highlightText(text, query) {
  if (!query) return text;
  var escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp('(' + escaped + ')', 'gi'), '<mark>$1</mark>');
}

function renderIntelResults(items, query) {
  grid.style.display = 'none';
  intelResults.style.display = 'grid';
  if (items.length === 0) {
    intelResults.innerHTML = '';
    noResults.style.display = 'block';
    noResultsText.textContent = '没有找到包含「' + query + '」的情报';
    return;
  }
  noResults.style.display = 'none';
  intelResults.innerHTML = items.map(function(item) {
    var titleHtml = highlightText(item.title, query);
    var bodyHtml = highlightText(item.body, query);
    var sourceHtml = item.sourceUrl
      ? '<div class="intel-source">📎 <a href="' + item.sourceUrl + '" target="_blank">' + item.sourceLabel + '</a></div>'
      : (item.sourceLabel ? '<div class="intel-source" style="color:var(--text3);">📎 ' + item.sourceLabel + '</div>' : '');
    var linkUrl = item.issueFile + '#' + item.sectionAnchor;
    return '<div class="intel-card">' +
      '<div class="intel-card-header">' +
        '<span class="intel-badge badge-' + item.section + '">' + item.section + '</span>' +
        '<div class="intel-title">' + titleHtml + '</div>' +
      '</div>' +
      '<div class="intel-body">' + bodyHtml + '</div>' +
      '<div class="intel-footer">' +
        sourceHtml +
        '<a class="intel-issue-link" href="' + linkUrl + '">📄 ' + item.issueDate + ' 期刊 →</a>' +
      '</div>' +
    '</div>';
  }).join('');
}

function onSearch() {
  var q = document.getElementById('searchInput').value.trim();
  currentQuery = q;
  var latestSec = document.getElementById('latestSection');
  var divider = document.getElementById('sectionDivider');

  searchClear.style.display = q ? 'flex' : 'none';
  searchTabs.style.display = q ? 'flex' : 'none';

  if (!q) {
    contentTitle.textContent = '📚 所有期刊';
    searchCount.textContent = '';
    latestSec.style.display = '';
    divider.style.display = '';
    noResults.style.display = 'none';
    renderIssues(ISSUES);
    return;
  }

  latestSec.style.display = 'none';
  divider.style.display = 'none';

  if (searchMode === 'intel') {
    searchIntel(q);
  } else {
    searchIssues(q);
  }
}

function searchIntel(q) {
  var lower = q.toLowerCase();
  var results = INTEL_ITEMS.filter(function(item) {
    return item.title.toLowerCase().indexOf(lower) !== -1 ||
      item.body.toLowerCase().indexOf(lower) !== -1 ||
      item.tags.some(function(t) { return t.toLowerCase().indexOf(lower) !== -1; }) ||
      item.section.toLowerCase().indexOf(lower) !== -1 ||
      (item.sourceLabel && item.sourceLabel.toLowerCase().indexOf(lower) !== -1);
  });
  contentTitle.textContent = '📰 情报搜索结果';
  searchCount.textContent = results.length > 0 ? '找到 ' + results.length + ' 条相关情报' : '';
  renderIntelResults(results, q);
}

function searchIssues(q) {
  var lower = q.toLowerCase();
  var filtered = ISSUES.filter(function(i) {
    return i.title.toLowerCase().indexOf(lower) !== -1 ||
      i.summary.toLowerCase().indexOf(lower) !== -1 ||
      i.tags.some(function(t) { return t.toLowerCase().indexOf(lower) !== -1; }) ||
      i.dateRange.indexOf(lower) !== -1;
  });
  contentTitle.textContent = '📚 期刊搜索结果';
  searchCount.textContent = filtered.length > 0 ? '找到 ' + filtered.length + ' 期相关结果' : '';
  renderIssues(filtered);
}

function switchSearchMode(mode) {
  searchMode = mode;
  document.querySelectorAll('.search-tab').forEach(function(tab) {
    tab.classList.toggle('active', tab.dataset.mode === mode);
  });
  if (currentQuery) onSearch();
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  currentQuery = '';
  searchClear.style.display = 'none';
  searchTabs.style.display = 'none';
  contentTitle.textContent = '📚 所有期刊';
  searchCount.textContent = '';
  document.getElementById('latestSection').style.display = '';
  document.getElementById('sectionDivider').style.display = '';
  noResults.style.display = 'none';
  renderIssues(ISSUES);
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
document.getElementById('totalIssues').textContent = ISSUES.length;
document.getElementById('totalIntel').textContent = INTEL_ITEMS.length;
renderLatestIssue();
renderIssues(ISSUES);
</script>
