// ══════════════════════════════════════════════
// SEARCH STATE
// ══════════════════════════════════════════════
let searchMode = 'intel'; // 'intel' | 'issue'
let currentQuery = '';

// ══════════════════════════════════════════════
// RENDER: Issues (期刊列表)
// ══════════════════════════════════════════════
const grid = document.getElementById('issuesGrid');
const intelResults = document.getElementById('intelResults');
const noResults = document.getElementById('noResults');
const noResultsText = document.getElementById('noResultsText');
const searchCount = document.getElementById('searchCount');
const searchClear = document.getElementById('searchClear');
const searchTabs = document.getElementById('searchTabs');
const contentTitle = document.getElementById('contentTitle');

function renderIssues(list) {
  intelResults.style.display = 'none';
  grid.style.display = 'grid';

  if (list.length === 0) {
    grid.innerHTML = '';
    noResults.style.display = 'block';
    noResultsText.textContent = '没有找到匹配的期刊';
    return;
  }
  noResults.style.display = 'none';
  grid.innerHTML = list.map(issue => {
    const d = new Date(issue.date + 'T00:00:00');
    const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
    return `
      <a class="issue-card" href="${issue.file}">
        <div class="issue-date-col">
          <div class="issue-month">${months[d.getMonth()]}</div>
          <div class="issue-day">${d.getDate()}</div>
          <div class="issue-year">${d.getFullYear()}</div>
        </div>
        <div class="issue-info">
          <div class="issue-title">${issue.title}</div>
          <div class="issue-meta">
            <span class="issue-tag tag-intel">${issue.intelCount} 条情报</span>
            <span class="issue-tag tag-amount">¥ ${issue.totalAmount}</span>
            <span class="issue-tag tag-sections">${issue.sections} 板块</span>
          </div>
          <div class="issue-summary">${issue.summary}</div>
        </div>
        <div class="issue-arrow">→</div>
      </a>
    `;
  }).join('');
}

// ══════════════════════════════════════════════
// RENDER: Intel items (情报条目搜索结果)
// ══════════════════════════════════════════════
function highlightText(text, query) {
  if (!query) return text;
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const regex = new RegExp(`(${escaped})`, 'gi');
  return text.replace(regex, '<mark>$1</mark>');
}

function renderIntelResults(items, query) {
  grid.style.display = 'none';
  intelResults.style.display = 'grid';

  if (items.length === 0) {
    intelResults.innerHTML = '';
    noResults.style.display = 'block';
    noResultsText.textContent = `没有找到包含「${query}」的情报`;
    return;
  }
  noResults.style.display = 'none';

  intelResults.innerHTML = items.map(item => {
    const titleHtml = highlightText(item.title, query);
    const bodyHtml = highlightText(item.body, query);
    const sourceHtml = item.sourceUrl
      ? `<div class="intel-source">📎 <a href="${item.sourceUrl}" target="_blank">${item.sourceLabel}</a></div>`
      : (item.sourceLabel ? `<div class="intel-source" style="color:var(--text3);">📎 ${item.sourceLabel}</div>` : '');
    const linkUrl = item.issueFile + '#' + item.sectionAnchor;

    return `
      <div class="intel-card">
        <div class="intel-card-header">
          <span class="intel-badge badge-${item.section}">${item.section}</span>
          <div class="intel-title">${titleHtml}</div>
        </div>
        <div class="intel-body">${bodyHtml}</div>
        <div class="intel-footer">
          ${sourceHtml}
          <a class="intel-issue-link" href="${linkUrl}">📄 ${item.issueDate} 期刊 →</a>
        </div>
      </div>
    `;
  }).join('');
}

// ══════════════════════════════════════════════
// SEARCH LOGIC
// ══════════════════════════════════════════════
function onSearch() {
  const q = document.getElementById('searchInput').value.trim();
  currentQuery = q;
  const hlSection = document.getElementById('highlightsSection');
  const divider = document.querySelector('.section-divider');

  // Show/hide clear button and tabs
  searchClear.style.display = q ? 'flex' : 'none';
  searchTabs.style.display = q ? 'flex' : 'none';

  if (!q) {
    contentTitle.textContent = '📚 所有期刊';
    searchCount.textContent = '';
    hlSection.style.display = '';
    divider.style.display = '';
    renderIssues(ISSUES);
    return;
  }

  // 搜索时隐藏要闻
  hlSection.style.display = 'none';
  divider.style.display = 'none';

  if (searchMode === 'intel') {
    searchIntel(q);
  } else {
    searchIssues(q);
  }
}

function searchIntel(q) {
  const lower = q.toLowerCase();
  const results = INTEL_ITEMS.filter(item =>
    item.title.toLowerCase().includes(lower) ||
    item.body.toLowerCase().includes(lower) ||
    item.tags.some(t => t.toLowerCase().includes(lower)) ||
    item.section.toLowerCase().includes(lower) ||
    (item.sourceLabel && item.sourceLabel.toLowerCase().includes(lower))
  );

  contentTitle.textContent = `📰 情报搜索结果`;
  searchCount.textContent = results.length > 0
    ? `找到 ${results.length} 条相关情报`
    : '';
  renderIntelResults(results, q);
}

function searchIssues(q) {
  const lower = q.toLowerCase();
  const filtered = ISSUES.filter(i =>
    i.title.toLowerCase().includes(lower) ||
    i.summary.toLowerCase().includes(lower) ||
    i.tags.some(t => t.toLowerCase().includes(lower)) ||
    i.dateRange.includes(lower)
  );

  contentTitle.textContent = '📚 期刊搜索结果';
  searchCount.textContent = filtered.length > 0
    ? `找到 ${filtered.length} 期相关结果`
    : '';
  renderIssues(filtered);
}

function switchSearchMode(mode) {
  searchMode = mode;
  document.querySelectorAll('.search-tab').forEach(tab => {
    tab.classList.toggle('active', tab.dataset.mode === mode);
  });
  if (currentQuery) onSearch();
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  currentQuery = '';
  searchClear.style.display = 'none';
  searchTabs.style.display = 'none';
  contentTitle.textContent = '📚 所有期刊';
  searchCount.textContent = '';
  document.getElementById('highlightsSection').style.display = '';
  document.querySelector('.section-divider').style.display = '';
  renderIssues(ISSUES);
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
document.getElementById('totalIssues').textContent = ISSUES.length;
document.getElementById('totalIntel').textContent = INTEL_ITEMS.length;
renderIssues(ISSUES);

// ── Render Highlights (本期要闻) ──
(function renderHighlights() {
  const highlightsGrid = document.getElementById('highlightsGrid');
  const highlightsDate = document.getElementById('highlightsDate');
  const highlightsSection = document.getElementById('highlightsSection');
  
  if (ISSUES.length === 0 || INTEL_ITEMS.length === 0) {
    highlightsSection.style.display = 'none';
    return;
  }

  // 取最新一期
  const latestIssue = ISSUES[0];
  highlightsDate.textContent = latestIssue.dateRange;

  // 从情报中选取有 insight 的条目优先，再补充其他重要条目，最多展示6条
  const withInsight = INTEL_ITEMS.filter(i => i.issueId === latestIssue.id && i.insight);
  const withoutInsight = INTEL_ITEMS.filter(i => i.issueId === latestIssue.id && !i.insight);
  const selected = [...withInsight, ...withoutInsight].slice(0, 6);

  highlightsGrid.innerHTML = selected.map(item => {
    const linkUrl = item.issueFile + '#' + item.sectionAnchor;
    const insightHtml = item.insight
      ? `<div class="hl-insight">💡 ${item.insight}</div>` : '';
    const sourceHtml = item.sourceUrl
      ? `<span class="hl-source">📎 <a href="${item.sourceUrl}" target="_blank">${item.sourceLabel}</a></span>`
      : (item.sourceLabel ? `<span class="hl-source">📎 ${item.sourceLabel}</span>` : '');
    const tagsHtml = item.tags.slice(0, 3).map(t => `<span class="hl-tag">${t}</span>`).join('');
    
    return `
      <a class="hl-card" href="${linkUrl}">
        <div class="hl-card-top">
          <span class="hl-badge badge-${item.section}">${item.section}</span>
          <div class="hl-tags">${tagsHtml}</div>
        </div>
        <div class="hl-title">${item.title}</div>
        <div class="hl-body">${item.body}</div>
        ${insightHtml}
        <div class="hl-footer">
          ${sourceHtml}
        </div>
      </a>
    `;
  }).join('');
})();

// ══════════════════════════════════════════════
// THEME: 用户可自主选择深色/浅色
// ══════════════════════════════════════════════
function setTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('idc-theme', theme);
  updateThemeSwitcher(theme);
}

function updateThemeSwitcher(theme) {
  document.querySelectorAll('.theme-opt').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.theme === theme);
  });
}

(function initTheme() {
  const saved = localStorage.getItem('idc-theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
  updateThemeSwitcher(saved);
})();
</script>
