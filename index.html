<style>
  /* ═══ 默认浅色 ═══ */
  :root {
    --bg: #f8f9fc; --bg2: #fff; --card: #fff; --card-hover: #f0f4ff;
    --border: #e2e6f0; --text: #1a1d2e; --text2: #5a5e73; --text3: #8b8fa3;
    --blue: #4d9fff; --red: #ff4d6a; --green: #34d399; --purple: #a78bfa;
    --orange: #ff8c42; --cyan: #22d3ee; --yellow: #fbbf24; --pink: #f472b6;
    --grad: linear-gradient(135deg, #e8e6f8 0%, #f8f9fc 50%, #e8f0f8 100%);
    --search-highlight: rgba(77,159,255,.15);
    --topbar-bg: rgba(248,249,252,.88);
    --shadow-card: 0 2px 12px rgba(0,0,0,.06);
    --shadow-hover: 0 8px 24px rgba(0,0,0,.08);
  }
  /* ═══ 深色覆盖 ═══ */
  [data-theme="dark"] {
    --bg: #0f1117; --bg2: #161824; --card: #1a1d2e; --card-hover: #222640;
    --border: #2a2e45; --text: #e2e4ed; --text2: #8b8fa3; --text3: #5a5e73;
    --grad: linear-gradient(135deg, #1e1b4b 0%, #0f1117 50%, #0c1524 100%);
    --search-highlight: rgba(77,159,255,.18);
    --topbar-bg: rgba(15,17,23,.85);
    --shadow-card: 0 2px 12px rgba(0,0,0,.2);
    --shadow-hover: 0 8px 24px rgba(0,0,0,.3);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: var(--bg); color: var(--text); line-height:1.7; -webkit-font-smoothing:antialiased;
    transition: background .3s, color .3s;
  }
  a { color: var(--blue); text-decoration: none; }

  /* ── Top bar ── */
  .topbar {
    position: sticky; top:0; z-index:100;
    background: var(--topbar-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border); padding:0 24px; height:56px;
    display:flex; align-items:center; justify-content:space-between;
    transition: background .3s;
  }
  .topbar-brand { display:flex; align-items:center; gap:10px; font-weight:700; font-size:15px; }
  .topbar-brand span { font-size:20px; }
  .topbar-actions { display:flex; align-items:center; gap:12px; }

  /* ── Theme Switcher ── */
  .theme-switcher {
    display:flex; align-items:center; background:var(--card); border:1px solid var(--border);
    border-radius:10px; overflow:hidden; height:36px; font-size:13px; font-weight:600;
  }
  .theme-opt {
    padding:0 14px; height:100%; display:flex; align-items:center; gap:5px;
    cursor:pointer; color:var(--text3); transition:all .2s; border:none; background:transparent;
    font-family:inherit; font-size:13px; font-weight:600; white-space:nowrap;
  }
  .theme-opt:hover { color:var(--text2); }
  .theme-opt.active {
    background:var(--blue); color:#fff; box-shadow:0 1px 6px rgba(77,159,255,.3);
  }

  /* ── Hero ── */
  .hero {
    background: var(--grad); border-bottom:1px solid var(--border);
    padding:56px 24px 48px; text-align:center; position:relative; overflow:hidden;
  }
  .hero::before {
    content:''; position:absolute; top:-50%; left:-50%; width:200%; height:200%;
    background: radial-gradient(circle at 30% 40%, rgba(77,159,255,.06) 0%, transparent 60%),
                radial-gradient(circle at 70% 60%, rgba(167,139,250,.05) 0%, transparent 60%);
    animation: drift 25s linear infinite;
  }
  @keyframes drift { from{transform:rotate(0)} to{transform:rotate(360deg)} }
  .hero-inner { position:relative; z-index:1; max-width:720px; margin:0 auto; }
  .hero-badge {
    display:inline-block; background:rgba(77,159,255,.12); color:var(--blue);
    font-size:12px; font-weight:700; padding:5px 14px; border-radius:20px;
    border:1px solid rgba(77,159,255,.2); letter-spacing:1.5px; margin-bottom:16px;
  }
  .hero h1 {
    font-size:clamp(26px,5vw,38px); font-weight:800; letter-spacing:-1px; margin-bottom:12px;
  }
  [data-theme="dark"] .hero h1 {
    background:linear-gradient(135deg,#fff 0%,#a0aec0 100%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  }
  .hero-desc { color:var(--text2); font-size:15px; max-width:520px; margin:0 auto 24px; }
  .hero-stats {
    display:flex; justify-content:center; gap:36px; flex-wrap:wrap;
  }
  .stat-item { text-align:center; }
  .stat-num { font-size:28px; font-weight:800; color:var(--text); }
  .stat-num small { font-size:13px; color:var(--text2); font-weight:500; }
  .stat-label { font-size:12px; color:var(--text3); margin-top:2px; }

  /* ── Search ── */
  .search-section { max-width:720px; margin:-24px auto 0; position:relative; z-index:10; padding:0 24px; }
  .search-box {
    display:flex; align-items:center; gap:10px;
    background:var(--card); border:1px solid var(--border); border-radius:14px;
    padding:12px 18px; box-shadow:var(--shadow-hover); transition:all .2s;
  }
  .search-box:focus-within { border-color:var(--blue); box-shadow:0 8px 32px rgba(77,159,255,.12); }
  .search-box svg { flex-shrink:0; color:var(--text3); }
  .search-box input {
    flex:1; border:none; background:transparent; color:var(--text);
    font-size:15px; outline:none; font-family:inherit;
  }
  .search-box input::placeholder { color:var(--text3); }
  .search-clear {
    display:none; width:24px; height:24px; border-radius:6px; border:none;
    background:var(--border); color:var(--text2); cursor:pointer; font-size:14px;
    align-items:center; justify-content:center; transition:all .2s; flex-shrink:0;
  }
  .search-clear:hover { background:var(--red); color:#fff; }
  .search-count { text-align:center; margin-top:12px; font-size:13px; color:var(--text3); min-height:20px; }

  /* ── Search mode tabs ── */
  .search-tabs {
    display:none; justify-content:center; gap:8px; margin-top:12px;
  }
  .search-tab {
    font-size:12px; font-weight:600; padding:5px 14px; border-radius:8px;
    border:1px solid var(--border); background:transparent; color:var(--text2);
    cursor:pointer; transition:all .2s; font-family:inherit;
  }
  .search-tab:hover { border-color:var(--blue); color:var(--text); }
  .search-tab.active { background:rgba(77,159,255,.1); border-color:rgba(77,159,255,.3); color:var(--blue); }

  /* ── Latest Issue Section (最新一期) ── */
  .latest-section {
    max-width:960px; margin:36px auto 0; padding:0 24px;
  }
  .latest-header {
    display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; flex-wrap:wrap; gap:12px;
  }
  .latest-title { font-size:20px; font-weight:800; }
  .latest-date { font-size:13px; color:var(--text3); }
  .latest-link {
    font-size:13px; color:var(--blue); font-weight:600; padding:6px 16px;
    border:1px solid rgba(77,159,255,.3); border-radius:8px; transition:all .2s;
  }
  .latest-link:hover { background:rgba(77,159,255,.1); }

  /* ── Section group (板块分组) ── */
  .sec-group { margin-bottom:28px; }
  .sec-group-header {
    display:flex; align-items:center; gap:10px; margin-bottom:14px;
    padding-bottom:10px; border-bottom:2px solid var(--border);
  }
  .sec-group-badge {
    font-size:12px; font-weight:700; padding:4px 12px; border-radius:6px;
    letter-spacing:.3px; white-space:nowrap;
  }
  .sec-group-name { font-size:16px; font-weight:700; }
  .sec-group-count { font-size:12px; color:var(--text3); margin-left:auto; }

  /* ── Intel card (情报卡片) ── */
  .intel-card {
    background:var(--card); border:1px solid var(--border); border-radius:14px;
    padding:20px 24px; transition:all .25s; margin-bottom:12px;
    box-shadow:var(--shadow-card);
  }
  .intel-card:hover { background:var(--card-hover); border-color:rgba(77,159,255,.2); box-shadow:var(--shadow-hover); }
  .intel-card:last-child { margin-bottom:0; }
  .intel-card-header { display:flex; align-items:flex-start; gap:12px; margin-bottom:10px; }
  .intel-badge {
    flex-shrink:0; font-size:11px; font-weight:700; padding:3px 10px; border-radius:6px;
    letter-spacing:.3px; white-space:nowrap;
  }
  .badge-重大 { background:rgba(255,77,106,.15); color:var(--red); }
  .badge-项目 { background:rgba(77,159,255,.15); color:var(--blue); }
  .badge-技术 { background:rgba(34,211,238,.15); color:var(--cyan); }
  .badge-政策 { background:rgba(52,211,153,.15); color:var(--green); }
  .badge-供应链 { background:rgba(255,140,66,.15); color:var(--orange); }
  .badge-观点 { background:rgba(167,139,250,.15); color:var(--purple); }
  .badge-招投标 { background:rgba(244,114,182,.15); color:var(--pink); }
  .badge-数据 { background:rgba(251,191,36,.15); color:var(--yellow); }
  .intel-title { font-size:16px; font-weight:700; line-height:1.5; flex:1; }
  .intel-title mark { background:var(--search-highlight); color:var(--blue); border-radius:2px; padding:0 2px; }
  .intel-body { font-size:14px; color:var(--text2); line-height:1.7; margin-bottom:8px; }
  .intel-body mark { background:var(--search-highlight); color:var(--blue); border-radius:2px; padding:0 2px; }
  .intel-insight {
    font-size:13px; color:var(--blue); font-weight:500; line-height:1.55;
    padding:10px 14px; background:rgba(77,159,255,.06); border-radius:8px;
    border-left:3px solid var(--blue); margin-bottom:10px;
  }
  .intel-footer {
    display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap;
  }
  .intel-source { font-size:13px; }
  .intel-source a { border-bottom:1px dashed rgba(77,159,255,.3); }
  .intel-source a:hover { border-bottom-color:var(--blue); }
  .intel-tags { display:flex; gap:5px; flex-wrap:wrap; }
  .intel-tag {
    font-size:11px; padding:2px 8px; border-radius:5px;
    background:rgba(77,159,255,.08); color:var(--text3); font-weight:500;
  }

  /* ── Search result link to issue ── */
  .intel-issue-link {
    font-size:12px; color:var(--text3); padding:3px 10px; border:1px solid var(--border);
    border-radius:6px; text-decoration:none; transition:all .2s; white-space:nowrap;
  }
  .intel-issue-link:hover { border-color:var(--blue); color:var(--blue); }

  /* ── Intel search results container ── */
  .intel-results { display:grid; grid-template-columns:1fr; gap:14px; }

  /* ── Divider ── */
  .section-divider {
    max-width:960px; margin:32px auto 0; padding:0 24px;
    border-top:1px solid var(--border);
  }

  /* ── Issues list ── */
  .content { max-width:960px; margin:24px auto 0; padding:0 24px 80px; }
  .content-header {
    display:flex; align-items:center; justify-content:space-between; margin-bottom:20px;
  }
  .content-title { font-size:18px; font-weight:700; }

  .issues-grid { display:grid; grid-template-columns:1fr; gap:16px; }
  .issue-card {
    display:grid; grid-template-columns:100px 1fr auto; align-items:start; gap:20px;
    background:var(--card); border:1px solid var(--border); border-radius:16px;
    padding:24px; transition:all .25s; cursor:pointer; text-decoration:none; color:inherit;
    box-shadow:var(--shadow-card);
  }
  .issue-card:hover { background:var(--card-hover); border-color:rgba(77,159,255,.3); transform:translateY(-2px); box-shadow:var(--shadow-hover); }
  .issue-date-col { text-align:center; }
  .issue-month { font-size:13px; color:var(--blue); font-weight:600; text-transform:uppercase; }
  .issue-day { font-size:32px; font-weight:800; line-height:1.1; }
  .issue-year { font-size:12px; color:var(--text3); }
  .issue-info { min-width:0; }
  .issue-title { font-size:17px; font-weight:700; margin-bottom:6px; line-height:1.4; }
  .issue-meta { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:8px; }
  .issue-tag {
    font-size:11px; font-weight:600; padding:2px 8px; border-radius:6px; letter-spacing:.3px;
  }
  .tag-intel { background:rgba(77,159,255,.12); color:var(--blue); }
  .tag-amount { background:rgba(52,211,153,.12); color:var(--green); }
  .tag-sections { background:rgba(167,139,250,.12); color:var(--purple); }
  .issue-summary { font-size:14px; color:var(--text2); line-height:1.6; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .issue-arrow { color:var(--text3); font-size:20px; padding-top:8px; transition:color .2s; }
  .issue-card:hover .issue-arrow { color:var(--blue); }

  .no-results {
    text-align:center; padding:60px 20px; color:var(--text3); font-size:15px;
  }
  .no-results span { font-size:48px; display:block; margin-bottom:12px; }

  /* ── Footer ── */
  .footer {
    text-align:center; padding:32px 24px; border-top:1px solid var(--border);
    color:var(--text3); font-size:13px; line-height:1.8;
  }

  /* ── Responsive ── */
  @media (max-width:640px) {
    .hero { padding:44px 16px 36px; }
    .hero-stats { gap:20px; }
    .stat-num { font-size:22px; }
    .search-section { margin-top:-20px; padding:0 16px; }
    .latest-section { padding:0 16px; }
    .content { padding:24px 16px 60px; }
    .issue-card { grid-template-columns:1fr; gap:12px; }
    .issue-date-col { text-align:left; display:flex; align-items:center; gap:8px; }
    .issue-day { font-size:20px; }
    .issue-arrow { display:none; }
    .theme-switcher { font-size:12px; }
    .theme-opt { padding:0 10px; }
    .intel-card { padding:16px; }
  }
</style>

    {"issueId":"2026-04-18","issueDate":"2026-04-18","issueFile":"issues/2026-04-18.html","section":"signal","sectionAnchor":"sec-signal","sectionName":"重大信号","title":"美国AI数据中心7GW容量危机：近半项目延迟或取消","body":"根据Bloomberg报道及行业追踪数据，美国2026年计划建设的AI数据中心中，近一半已被推迟或取消。原本计划的12GW容量中，仅有约5GW正在积极建设中，剩余的7GW（约占总量的58%）处于停滞状态。危机源于电力瓶颈、组件短缺、关税影响及社区反对。","insight":"这场危机并非简单的资金问题，而是物理基础设施（特别是电力和变压器供应链）的硬约束，将导致短期内AI部署速度放缓，推高内存和存储价格，并可能促使科技巨头将资本支出投向海外或转向核能等长期电力解决方案。","sourceLabel":"Tech Insider","sourceUrl":"https://tech-insider.org/us-ai-data-center-delays-cancellations-7gw-capacity-crisis-2026/","tags":["美国AI","7GW危机","供应链","电力瓶颈"]},
    {"issueId":"2026-04-18","issueDate":"2026-04-18","issueFile":"issues/2026-04-18.html","section":"signal","sectionAnchor":"sec-signal","sectionName":"重大信号","title":"缅因州数据中心暂停令立法通过，提交州长签署","body":"缅因州立法机构（由民主党控制）已于本周二（4/17）正式批准了该项法案，目前已被提交给州长Janet Mills等待签署。如最终生效，这将是美国第一个针对高能耗数据中心的全州范围暂停令（moratorium）。法案将对超过特定规模的数据中心实施一年多的暂停建设令，并建立特别委员会协助各城镇审查潜在的数据中心项目。","insight":"这是美国数据中心行业监管的重要转折点，可能引发其他州跟进类似立法，对行业扩张产生深远影响。州长Janet Mills尚未表态是否签署，其政治动向（正在竞选美国参议院席位）可能产生影响。","sourceLabel":"AP News","sourceUrl":"https://apnews.com/article/data-centers-moratoriums-maine-artificial-intelligence-ai-aa63ba087d5ad53ab0735893646e7357","tags":["缅因州","暂停令","州级立法","监管转折"]},
    {"issueId":"2026-04-18","issueDate":"2026-04-18","issueFile":"issues/2026-04-18.html","section":"project","sectionAnchor":"sec-project","sectionName":"项目与市场","title":"晶科科技拟245亿元投建宁夏中卫算力中心，规划5万架机柜","body":"晶科科技（601778.SH）近日已与中卫市人民政府签署了《投资协议》，拟在宁夏中卫投建算力中心，总投资约245亿元，规划部署机柜约5万架。项目分三期建设：一期投资约100亿元（IT功率400MW），二期投资约60亿元（IT功率300MW），三期投资约85亿元（IT功率300MW）。","insight":"这是宁夏枢纽又一个超大规模算力中心项目，标志着新能源+算力算电协同模式在西北地区的加速落地。晶科科技作为光伏企业跨界算力基础设施，体现了产业链延伸的趋势。","sourceLabel":"新浪财经/财联社","sourceUrl":"https://k.sina.cn/article_7857201856_1d45362c001904enz0.html","tags":["晶科科技","245亿","宁夏中卫","5万架","算电协同"]},

  {"issueId":"2026-04-05","issueDate":"2026-04-05","issueFile":"issues/2026-04-05.html","section":"重大","sectionAnchor":"sec-signal","sectionName":"🔥 重大信号","title":"字节+阿里2026算力规划曝光：合计需求超3.5GW，液冷成标配","body":"IDC圈4月2日报道：字节跳动2026年国内IDC需求约<strong>1.5GW</strong>，Q1已完成1GW招标；阿里规划<strong>2GW</strong>，4月启动首批500MW。两家均以租赁为主（字节自建占比10%-15%），国产GPU比例显著提升（字节15%-20%，阿里20%-30%）。新招标强制要求液冷：字节95%机柜功率21kW、5%为50kW，超21kW必须上液冷。","insight":"3.5GW需求相当于35个百兆瓦级DC，液冷从加分项变为一票否决项。","sourceLabel":"中国IDC圈","sourceUrl":"https://news.idcquan.com/news/206696.shtml","tags":["字节跳动","阿里巴巴","3.5GW","液冷","国产GPU"]},
  {"issueId":"2026-04-05","issueDate":"2026-04-05","issueFile":"issues/2026-04-05.html","section":"项目","sectionAnchor":"sec-project","sectionName":"🏗️ 项目与市场","title":"JLL报告：2030年全球DC容量翻倍至200GW，未来5年投资3万亿美元","body":"仲量联行（JLL）发布《2026年全球数据中心展望》：全球DC总容量将从<strong>103GW</strong>增至<strong>200GW</strong>（2030年），未来5年投资<strong>3万亿美元</strong>（含1.2万亿房地产价值创造）。截至2025年底全球DC使用率<strong>97%</strong>，在建项目<strong>77%</strong>已获预租。中国DC市场2024年达<strong>3048亿元</strong>（CAGR 28.26%）。","insight":"97%使用率+77%预租率显示市场远未出现泡沫，DC已与传统商业地产平起平坐。","sourceLabel":"仲量联行","sourceUrl":"https://www.joneslanglasalle.com.cn/zh-cn/insights/2026-data-center-outlook","tags":["JLL","200GW","3万亿美元","97%使用率"]},
  {"issueId":"2026-04-05","issueDate":"2026-04-05","issueFile":"issues/2026-04-05.html","section":"项目","sectionAnchor":"sec-project","sectionName":"🏗️ 项目与市场","title":"华创AIDC研报：中国AIDC市场CAGR达58%，2027年将至1963亿元","body":"华创证券4月1日发布《Tokens爆发，推理需求开启全球AIDC新周期》：全球智能算力占比首超<strong>85%</strong>；中国AIDC市场2024年约<strong>494亿元</strong>，预计2027年增至<strong>1963亿元</strong>（CAGR 58%）；2026年2月中国模型Token用量<strong>4.12万亿</strong>首超美国2.94万亿；阿里2025-2027年投入超<strong>3800亿元</strong>。","insight":"AIDC正从IDC中分化为独立赛道，58%的CAGR意味着3年内市场翻4倍。","sourceLabel":"华创证券/同花顺","sourceUrl":"https://news.10jqka.com.cn/20260331/c675655841.shtml","tags":["AIDC","58%","1963亿","智能算力","华创证券"]},
  {"issueId":"2026-04-05","issueDate":"2026-04-05","issueFile":"issues/2026-04-05.html","section":"技术","sectionAnchor":"sec-tech","sectionName":"⚡ 技术趋势","title":"SemiAnalysis：内存占DC成本将达30%，四年翻近两番","body":"SemiAnalysis 4月3日报告：2026年内存（含HBM/DRAM）将占超大规模DC总资本支出约<strong>30%</strong>，而2023-2024年这一比例仅为<strong>8%</strong>。AI大模型训练和推理对内存带宽的极端需求是核心驱动因素。","insight":"内存成本占比从8%跃升至30%，DC建设成本结构正根本性重塑。","sourceLabel":"SemiAnalysis","sourceUrl":"https://www.semianalysis.com/","tags":["内存","30%","HBM","SemiAnalysis"]},
  {"issueId":"2026-04-05","issueDate":"2026-04-05","issueFile":"issues/2026-04-05.html","section":"技术","sectionAnchor":"sec-tech","sectionName":"⚡ 技术趋势","title":"海底数据中心纳入十五五创新支持，行业全景调研发布","body":"中研网4月3日发布数据中心行业全景调研报告：\"十五五\"期间（2026-2030年），国家支持海底数据中心等创新模式，推动算电一体、绿色集约的数字基础设施建设。UDC利用海洋冷源实现高效散热，结合海上风电直供可实现淡水零消耗。","insight":"海底DC从概念走向国家战略支持层面，对沿海城市IDC市场格局可能产生长期影响。","sourceLabel":"中研网","sourceUrl":"https://www.chinairn.com/news/20260403/11320263.shtml","tags":["海底DC","十五五","UDC","绿色"]},
  {"issueId":"2026-04-05","issueDate":"2026-04-05","issueFile":"issues/2026-04-05.html","section":"技术","sectionAnchor":"sec-tech","sectionName":"⚡ 技术趋势","title":"IDC Research：Vera Rubin平台重构DC架构，每瓦性能提升10倍","body":"IDC Research分析英伟达GTC 2026：Vera Rubin全栈计算平台（7款芯片+5款机架系统）实现每瓦性能较Blackwell提升<strong>10倍</strong>，将整个机架视为统一计算单元。新平台要求DC电力密度达到新高度，液冷为唯一散热方案。预计2026下半年出货。","insight":"10倍每瓦性能意味着单机架功率将进一步攀升，传统DC面临全面升级压力。","sourceLabel":"IDC Research","sourceUrl":"https://www.idc.com/resource-center/blog/","tags":["Vera Rubin","10倍","GTC 2026","液冷"]},
  {"issueId":"2026-04-05","issueDate":"2026-04-05","issueFile":"issues/2026-04-05.html","section":"政策","sectionAnchor":"sec-policy","sectionName":"📜 政策法规","title":"算电协同写入政府报告，枢纽节点新建DC绿电占比≥80%（强制）","body":"2026年全国两会首次将\"算电协同\"写入政府工作报告，明确国家枢纽节点新建DC<strong>绿电占比≥80%</strong>（从鼓励转强制）。庆阳绿电聚合试点：园区到户综合电价<strong>&lt;0.4元/kWh</strong>（全国均值0.66），直降<strong>40%</strong>；每年消纳绿电<strong>19.9亿kWh</strong>，减排CO₂ 161.57万吨。","insight":"80%绿电占比从鼓励变强制，是DC能源政策重大转折。庆阳模式将在其他枢纽节点复制。","sourceLabel":"CWESE/新华社","sourceUrl":"https://www.cwese.com/index.php?m=home&c=View&a=index&aid=1275","tags":["算电协同","80%绿电","庆阳","0.4元/kWh"]},
  {"issueId":"2026-04-05","issueDate":"2026-04-05","issueFile":"issues/2026-04-05.html","section":"政策","sectionAnchor":"sec-policy","sectionName":"📜 政策法规","title":"中国能源报：DC绿色低碳转型使其成为新型能源资产","body":"中国能源报3月30日发文：国际能源署研究显示，若DC具备运行灵活性（每年仅需灵活调节1%时间），到2035年前新增DC可完全不增加电网额外负担。DC正从\"能耗大户\"转型为\"新型能源资产\"。","insight":"定性转变意义重大——DC从被动能耗管控对象变为主动电网灵活性资源。","sourceLabel":"中国能源报/人民日报社","sourceUrl":"https://paper.people.com.cn/zgnyb/pc/content/202603/30/content_30148761.html","tags":["新型能源资产","IEA","电网灵活性"]},
  {"issueId":"2026-04-05","issueDate":"2026-04-05","issueFile":"issues/2026-04-05.html","section":"供应链","sectionAnchor":"sec-supply","sectionName":"🔗 供应链动态","title":"AI算力供应链全线紧绷：H100 GPU租价5个月飙升40%","body":"SemiAnalysis 4月2日报告：H100一年期租约从2025年10月<strong>$1.70/GPU/h</strong>升至2026年3月<strong>$2.35</strong>，涨幅<strong>40%</strong>。DDR5合同价Q1同比涨近<strong>5倍</strong>。按需算力全线售罄，Blackwell集群交期延至2026年6-7月。Neocloud掌握议价权，可争取更高预付款和更长合约。","insight":"供应链全线紧绷标志AI算力进入真正卖方市场，DC运营商议价权翻转。","sourceLabel":"华尔街见闻/SemiAnalysis","sourceUrl":"https://wallstreetcn.com/articles/3769129","tags":["H100","40%","SemiAnalysis","卖方市场"]},
  {"issueId":"2026-04-05","issueDate":"2026-04-05","issueFile":"issues/2026-04-05.html","section":"供应链","sectionAnchor":"sec-supply","sectionName":"🔗 供应链动态","title":"液冷CDU交期超6个月，冷板/快接头产能充足","body":"行业专家分享AIDC液冷产业链最新动态：CDU自2025年起产能紧缺，头部厂家交期超<strong>6个月</strong>；2026年因越南新厂等扩产逐步缓解。Manifold、快接头产能充足，普通冷板交期正常。","insight":"液冷供应链从全面紧缺过渡到结构性分化，CDU仍是卡脖子环节。","sourceLabel":"雪球/行业专家","sourceUrl":"https://xueqiu.com/1156610613/381846499","tags":["CDU","液冷","6个月","供应链分化"]},
  {"issueId":"2026-04-05","issueDate":"2026-04-05","issueFile":"issues/2026-04-05.html","section":"招聘","sectionAnchor":"sec-recruit","sectionName":"📌 招聘动向","title":"周末暂无新增重大官网招聘动态，字节阿里岗位需求预计4月集中释放","body":"周末各厂商官网招聘页面更新频率较低。结合字节Q1完成1GW招标、阿里4月启动500MW招标的最新动态，相关运维、项目管理、液冷工程师等岗位需求预计4月集中释放。","insight":"字节+阿里3.5GW需求将带动IDC行业大规模招聘潮。","sourceLabel":"中国IDC圈综合","sourceUrl":"https://news.idcquan.com/news/206696.shtml","tags":["招聘","字节","阿里","液冷工程师"]},
  {"issueId":"2026-04-05","issueDate":"2026-04-05","issueFile":"issues/2026-04-05.html","section":"招投标","sectionAnchor":"sec-bid","sectionName":"📋 招投标公告","title":"邮储银行2026-2028年北京IDC机房驻场IT运维服务公开招标","body":"中国邮政储蓄银行委托中化商务就2026-2028年北京IDC机房驻场IT运维服务进行公开招标，涵盖北京网络驻场及廊坊IDC机房驻场服务（周期3年）。","insight":"银行业持续外包IDC运维，合约周期拉长至3年反映金融机构对DC运维专业化、长期化需求。","sourceLabel":"中国邮政官网","sourceUrl":"https://www.chinapost.com.cn/html1/report/26031/1897-1.htm","tags":["邮储银行","IDC运维","3年","招标"]},
  {"issueId":"2026-04-05","issueDate":"2026-04-05","issueFile":"issues/2026-04-05.html","section":"招投标","sectionAnchor":"sec-bid","sectionName":"📋 招投标公告","title":"九江银行2026年武汉数据中心网络设备采购项目招标","body":"九江银行就武汉数据中心网络设备采购项目（标段一）进行公开招标，资金来源为企业自筹。","insight":"中小银行加速建设异地灾备DC（九江→武汉），反映金融行业对数据安全和业务连续性的重视。","sourceLabel":"九江银行官网","sourceUrl":"https://www.jjccb.com/jjccb/zbcg/ggaaxmzbgg/2026033117280347185/index.shtml","tags":["九江银行","武汉","灾备","网络设备"]},
  {"issueId":"2026-04-05","issueDate":"2026-04-05","issueFile":"issues/2026-04-05.html","section":"招投标","sectionAnchor":"sec-bid","sectionName":"📋 招投标公告","title":"中原农业保险IDC机房托管业务单一来源采购，中国移动中标","body":"中原农业保险补充采购2025-2027年数据专线及IDC机房托管业务，单一来源采购，中标方为中国移动河南郑州分公司。","insight":"保险机构IDC托管需求持续增长，运营商在金融行业IDC托管市场占据优势。","sourceLabel":"河南省招标采购综合网","sourceUrl":"https://www.hnzbcg.cn/zhaobiao/167299.html","tags":["中原保险","中国移动","IDC托管","中标"]},
  {"issueId":"2026-04-05","issueDate":"2026-04-05","issueFile":"issues/2026-04-05.html","section":"观点","sectionAnchor":"sec-quote","sectionName":"👀 人物与观点","title":"JLL庞树东/姚耀：DC已成与办公空间同等重要的战略性不动产","body":"仲量联行中国区负责人：\"算力基础设施正在成为与办公空间、生产工厂同等重要的战略性不动产配置。自2020年以来，全球DC直接投资已达约750亿美元，并购规模超3000亿美元。\"","insight":"主流机构将DC定位为战略性不动产的共识正在形成。","sourceLabel":"仲量联行报告","sourceUrl":"https://www.joneslanglasalle.com.cn/zh-cn/insights/2026-data-center-outlook","tags":["JLL","战略不动产","3000亿"]},
  {"issueId":"2026-04-05","issueDate":"2026-04-05","issueFile":"issues/2026-04-05.html","section":"观点","sectionAnchor":"sec-quote","sectionName":"👀 人物与观点","title":"SemiAnalysis：算力价格方向大概率向上，三大指标需关注","body":"SemiAnalysis分析团队：\"Anthropic ARR单季度从90亿飙至超250亿美元，AI代理工作流算力消耗呈抛物线增长。在GB300集群放量、硅片短缺缓解和AI实验室ARR增长轨迹三个指标出现转向前，算力价格方向大概率向上。\"","insight":"SemiAnalysis是全球最具影响力的半导体分析机构之一，其判断对DC投资决策有重要参考价值。","sourceLabel":"华尔街见闻/SemiAnalysis","sourceUrl":"https://wallstreetcn.com/articles/3769129","tags":["SemiAnalysis","Anthropic","250亿","算力价格"]},
  {issueId:"2026-04-04",issueDate:"2026-04-04",issueFile:"issues/2026-04-04.html",section:"重大",sectionAnchor:"sec-signal",sectionName:"🔥 重大信号",title:"Meta德州数据中心投资翻倍至100亿美元，目标容量1GW",body:"Meta将其位于德克萨斯州埃尔帕索的数据中心投资额大幅提升至100亿美元，目标容量1GW，预计2028年前投入运营。这是Meta目前最大的单体数据中心项目。",insight:"单体项目百亿美元级投资成为常态，反映超大规模玩家在AI基础设施上的军备竞赛加速。",sourceLabel:"Data Center Knowledge",sourceUrl:"https://www.datacenterknowledge.com/data-center-construction/new-data-center-developments-april-2026",tags:["Meta","100亿美元","1GW","德克萨斯"]},
  {issueId:"2026-04-04",issueDate:"2026-04-04",issueFile:"issues/2026-04-04.html",section:"重大",sectionAnchor:"sec-signal",sectionName:"🔥 重大信号",title:"全球超大规模企业资本支出滚动增长至7000亿美元",body:"Nebius芬兰100亿美元、Oracle密歇根160亿美元、DayOne马来西亚280亿美元等项目持续落地。行业资本支出以GW为单位计量，传统枢纽容量见顶推动投资向东南亚和美国二级市场转移。Oracle裁员数千人同时斥巨资建基础设施。",insight:"数据中心投资已进入万亿美元时代，能源优先取代光纤优先成为选址第一原则。",sourceLabel:"LinkedIn行业周报",sourceUrl:"https://www.linkedin.com/pulse/weekly-data-center-industry-news-first-weeks-april-2026-kim-lwpqf",tags:["7000亿","资本支出","Nebius","Oracle","DayOne"]},
  {issueId:"2026-04-04",issueDate:"2026-04-04",issueFile:"issues/2026-04-04.html",section:"重大",sectionAnchor:"sec-signal",sectionName:"🔥 重大信号",title:"Amazon西班牙337亿欧元AI基础设施投资",body:"Amazon公布在西班牙阿拉贡等地扩大云和AI基础设施的大规模投资计划，总额达337亿欧元，涵盖数据中心和供应链设施。",insight:"西班牙凭借可再生能源优势和相对宽松的电力供应吸引巨额投资，成为欧洲数据中心版图的新增长极。",sourceLabel:"Data Center Knowledge",sourceUrl:"https://www.datacenterknowledge.com/data-center-construction/new-data-center-developments-april-2026",tags:["Amazon","337亿欧元","西班牙","欧洲"]},

// THEME
// ══════════════════════════════════════════════
function setTheme(theme) {
  if (theme === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
  } else {
    document.documentElement.removeAttribute('data-theme');
  }
  localStorage.setItem('idc-theme', theme);
  updateThemeSwitcher(theme);
}

function updateThemeSwitcher(theme) {
  document.querySelectorAll('.theme-opt').forEach(function(btn) {
    btn.classList.toggle('active', btn.dataset.theme === theme);
  });
}

function getCurrentTheme() {
  return localStorage.getItem('idc-theme') || 'light';
}

// Apply immediately
(function() {
  var theme = getCurrentTheme();
  if (theme === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
  }
  // light = no attribute = :root defaults
  updateThemeSwitcher(theme);
})();

// RENDER: Latest Issue (最新一期完整内容)
// ══════════════════════════════════════════════
function renderLatestIssue() {
  var latestSection = document.getElementById('latestSection');
  if (ISSUES.length === 0 || INTEL_ITEMS.length === 0) {
    latestSection.style.display = 'none';
    return;
  }

  var latest = ISSUES[0];
  document.getElementById('latestTitle').textContent = '📢 ' + latest.title;
  document.getElementById('latestDate').textContent = latest.dateRange + ' · ' + latest.intelCount + ' 条情报 · 涉及金额 ¥' + latest.totalAmount;
  document.getElementById('latestLink').href = latest.file;

  // 按板块分组
  var items = INTEL_ITEMS.filter(function(i) { return i.issueId === latest.id; });
  var sectionOrder = ['重大','项目','技术','政策','供应链','观点','招投标','数据'];
  var groups = {};
  items.forEach(function(item) {
    if (!groups[item.section]) {
      groups[item.section] = { name: item.sectionName || item.section, items: [] };
    }
    groups[item.section].items.push(item);
  });

  var html = '';
  sectionOrder.forEach(function(sec) {
    if (!groups[sec]) return;
    var g = groups[sec];
    html += '<div class="sec-group">';
    html += '<div class="sec-group-header">';
    html += '<span class="sec-group-badge badge-' + sec + '">' + sec + '</span>';
    html += '<span class="sec-group-name">' + g.name + '</span>';
    html += '<span class="sec-group-count">' + g.items.length + ' 条</span>';
    html += '</div>';

    g.items.forEach(function(item) {
      var insightHtml = item.insight
        ? '<div class="intel-insight">💡 ' + item.insight + '</div>' : '';
      var sourceHtml = '';
      if (item.sourceUrl) {
        sourceHtml = '<div class="intel-source">📎 <a href="' + item.sourceUrl + '" target="_blank">' + item.sourceLabel + '</a></div>';
      } else if (item.sourceLabel) {
        sourceHtml = '<div class="intel-source" style="color:var(--text3);">📎 ' + item.sourceLabel + '</div>';
      }
      var tagsHtml = item.tags.map(function(t) {
        return '<span class="intel-tag">' + t + '</span>';
      }).join('');

      html += '<div class="intel-card">';
      html += '<div class="intel-card-header">';
      html += '<span class="intel-badge badge-' + item.section + '">' + item.section + '</span>';
      html += '<div class="intel-title">' + item.title + '</div>';
      html += '</div>';
      html += '<div class="intel-body">' + item.body + '</div>';
      html += insightHtml;
      html += '<div class="intel-footer">';
      html += sourceHtml;
      html += '<div class="intel-tags">' + tagsHtml + '</div>';
      html += '</div>';
      html += '</div>';
    });

    html += '</div>';
  });

  document.getElementById('latestContent').innerHTML = html;
}

// RENDER: Issues list
// ══════════════════════════════════════════════
var grid = document.getElementById('issuesGrid');
var intelResults = document.getElementById('intelResults');
var noResults = document.getElementById('noResults');
var noResultsText = document.getElementById('noResultsText');
var searchCount = document.getElementById('searchCount');
var searchClear = document.getElementById('searchClear');
var searchTabs = document.getElementById('searchTabs');
var contentTitle = document.getElementById('contentTitle');

function renderIssues(list) {
  intelResults.style.display = 'none';
  grid.style.display = 'grid';
  if (list.length === 0) {
    grid.innerHTML = '';
    noResults.style.display = 'block';
    noResultsText.textContent = '没有找到匹配的期刊';
    return;
  }
  noResults.style.display = 'none';
  grid.innerHTML = list.map(function(issue) {
    var d = new Date(issue.date + 'T00:00:00');
    var months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
    return '<a class="issue-card" href="' + issue.file + '">' +
      '<div class="issue-date-col">' +
        '<div class="issue-month">' + months[d.getMonth()] + '</div>' +
        '<div class="issue-day">' + d.getDate() + '</div>' +
        '<div class="issue-year">' + d.getFullYear() + '</div>' +
      '</div>' +
      '<div class="issue-info">' +
        '<div class="issue-title">' + issue.title + '</div>' +
        '<div class="issue-meta">' +
          '<span class="issue-tag tag-intel">' + issue.intelCount + ' 条情报</span>' +
          '<span class="issue-tag tag-amount">¥ ' + issue.totalAmount + '</span>' +
          '<span class="issue-tag tag-sections">' + issue.sections + ' 板块</span>' +
        '</div>' +
        '<div class="issue-summary">' + issue.summary + '</div>' +
      '</div>' +
      '<div class="issue-arrow">→</div>' +
    '</a>';
  }).join('');
}

// SEARCH
// ══════════════════════════════════════════════
var searchMode = 'intel';
var currentQuery = '';

function highlightText(text, query) {
  if (!query) return text;
  var escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp('(' + escaped + ')', 'gi'), '<mark>$1</mark>');
}

function renderIntelResults(items, query) {
  grid.style.display = 'none';
  intelResults.style.display = 'grid';
  if (items.length === 0) {
    intelResults.innerHTML = '';
    noResults.style.display = 'block';
    noResultsText.textContent = '没有找到包含「' + query + '」的情报';
    return;
  }
  noResults.style.display = 'none';
  intelResults.innerHTML = items.map(function(item) {
    var titleHtml = highlightText(item.title, query);
    var bodyHtml = highlightText(item.body, query);
    var sourceHtml = item.sourceUrl
      ? '<div class="intel-source">📎 <a href="' + item.sourceUrl + '" target="_blank">' + item.sourceLabel + '</a></div>'
      : (item.sourceLabel ? '<div class="intel-source" style="color:var(--text3);">📎 ' + item.sourceLabel + '</div>' : '');
    var linkUrl = item.issueFile + '#' + item.sectionAnchor;
    return '<div class="intel-card">' +
      '<div class="intel-card-header">' +
        '<span class="intel-badge badge-' + item.section + '">' + item.section + '</span>' +
        '<div class="intel-title">' + titleHtml + '</div>' +
      '</div>' +
      '<div class="intel-body">' + bodyHtml + '</div>' +
      '<div class="intel-footer">' +
        sourceHtml +
        '<a class="intel-issue-link" href="' + linkUrl + '">📄 ' + item.issueDate + ' 期刊 →</a>' +
      '</div>' +
    '</div>';
  }).join('');
}

function onSearch() {
  var q = document.getElementById('searchInput').value.trim();
  currentQuery = q;
  var latestSec = document.getElementById('latestSection');
  var divider = document.getElementById('sectionDivider');

  searchClear.style.display = q ? 'flex' : 'none';
  searchTabs.style.display = q ? 'flex' : 'none';

  if (!q) {
    contentTitle.textContent = '📚 所有期刊';
    searchCount.textContent = '';
    latestSec.style.display = '';
    divider.style.display = '';
    noResults.style.display = 'none';
    renderIssues(ISSUES);
    return;
  }

  latestSec.style.display = 'none';
  divider.style.display = 'none';

  if (searchMode === 'intel') {
    searchIntel(q);
  } else {
    searchIssues(q);
  }
}

function searchIntel(q) {
  var lower = q.toLowerCase();
  var results = INTEL_ITEMS.filter(function(item) {
    return item.title.toLowerCase().indexOf(lower) !== -1 ||
      item.body.toLowerCase().indexOf(lower) !== -1 ||
      item.tags.some(function(t) { return t.toLowerCase().indexOf(lower) !== -1; }) ||
      item.section.toLowerCase().indexOf(lower) !== -1 ||
      (item.sourceLabel && item.sourceLabel.toLowerCase().indexOf(lower) !== -1);
  });
  contentTitle.textContent = '📰 情报搜索结果';
  searchCount.textContent = results.length > 0 ? '找到 ' + results.length + ' 条相关情报' : '';
  renderIntelResults(results, q);
}

function searchIssues(q) {
  var lower = q.toLowerCase();
  var filtered = ISSUES.filter(function(i) {
    return i.title.toLowerCase().indexOf(lower) !== -1 ||
      i.summary.toLowerCase().indexOf(lower) !== -1 ||
      i.tags.some(function(t) { return t.toLowerCase().indexOf(lower) !== -1; }) ||
      i.dateRange.indexOf(lower) !== -1;
  });
  contentTitle.textContent = '📚 期刊搜索结果';
  searchCount.textContent = filtered.length > 0 ? '找到 ' + filtered.length + ' 期相关结果' : '';
  renderIssues(filtered);
}

function switchSearchMode(mode) {
  searchMode = mode;
  document.querySelectorAll('.search-tab').forEach(function(tab) {
    tab.classList.toggle('active', tab.dataset.mode === mode);
  });
  if (currentQuery) onSearch();
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  currentQuery = '';
  searchClear.style.display = 'none';
  searchTabs.style.display = 'none';
  contentTitle.textContent = '📚 所有期刊';
  searchCount.textContent = '';
  document.getElementById('latestSection').style.display = '';
  document.getElementById('sectionDivider').style.display = '';
  noResults.style.display = 'none';
  renderIssues(ISSUES);
}
