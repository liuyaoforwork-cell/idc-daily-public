  /* ═══ CSS Variables ═══ */
  :root {
    --bg: #f5f6fa; --bg2: #fff; --card: #fff;
    --border: #e8ebf2; --text: #1a1d2e; --text2: #5a5e73; --text3: #8b8fa3;
    --blue: #4d9fff; --red: #ff4d6a; --green: #34d399; --purple: #a78bfa;
    --orange: #ff8c42; --cyan: #22d3ee; --yellow: #fbbf24; --pink: #f472b6;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  [data-theme="dark"] {
    --bg: #0f1117; --bg2: #161824; --card: #1a1d2e;
    --border: #2a2e45; --text: #e2e4ed; --text2: #8b8fa3; --text3: #5a5e73;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html { font-size:16px; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: var(--bg); color: var(--text); line-height:1.65;
    -webkit-font-smoothing: antialiased; transition: background .3s, color .3s;
    padding-bottom: calc(64px + var(--safe-bottom));
    padding-top: var(--safe-top);
    overscroll-behavior-y: contain;
  }
  a { color: var(--blue); text-decoration: none; }

  /* ═══ Header ═══ */
  .header {
    position: sticky; top: 0; z-index: 100;
    background: var(--bg); padding: 12px 16px 0;
    border-bottom: 1px solid var(--border);
  }
  .header-top {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px;
  }
  .header-brand { display: flex; align-items: center; gap: 8px; }
  .header-brand .icon { font-size: 22px; }
  .header-brand .name { font-size: 17px; font-weight: 700; }
  .header-actions { display: flex; align-items: center; gap: 10px; }
  .theme-btn {
    width: 36px; height: 36px; border-radius: 10px; border: 1px solid var(--border);
    background: var(--card); display: flex; align-items: center; justify-content: center;
    font-size: 18px; cursor: pointer; transition: all .2s;
  }
  .theme-btn:active { transform: scale(.92); }
  .desktop-link {
    font-size: 12px; color: var(--text3); padding: 6px 10px; border: 1px solid var(--border);
    border-radius: 8px; background: var(--card); white-space: nowrap;
  }

  /* ── Search ── */
  .search-wrap { padding: 0 0 12px; }
  .search-box {
    display: flex; align-items: center; gap: 8px;
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 10px 14px; transition: border-color .2s;
  }
  .search-box:focus-within { border-color: var(--blue); }
  .search-box svg { flex-shrink: 0; color: var(--text3); width: 16px; height: 16px; }
  .search-box input {
    flex: 1; border: none; background: transparent; color: var(--text);
    font-size: 15px; outline: none; font-family: inherit;
  }
  .search-box input::placeholder { color: var(--text3); }
  .search-clear {
    display: none; width: 22px; height: 22px; border-radius: 6px; border: none;
    background: var(--border); color: var(--text2); cursor: pointer; font-size: 12px;
    align-items: center; justify-content: center;
  }

  /* ═══ Tab bar (bottom) ═══ */
  .tab-bar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
    background: var(--bg2); border-top: 1px solid var(--border);
    display: flex; padding-bottom: var(--safe-bottom);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  }
  .tab-item {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px;
    padding: 8px 0 6px; cursor: pointer; transition: all .15s;
    color: var(--text3); font-size: 10px; font-weight: 600; border: none; background: none;
    font-family: inherit;
  }
  .tab-item.active { color: var(--blue); }
  .tab-item .tab-icon { font-size: 20px; line-height: 1; }

  /* ═══ Views ═══ */
  .view { display: none; }
  .view.active { display: block; }

  /* ═══ Latest View ═══ */
  .latest-hero {
    padding: 20px 16px; background: linear-gradient(135deg, rgba(77,159,255,.08), rgba(167,139,250,.06));
  }
  .latest-hero-title { font-size: 18px; font-weight: 800; margin-bottom: 6px; line-height: 1.4; }
  [data-theme="dark"] .latest-hero-title {
    background: linear-gradient(135deg, #fff, #a0aec0); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .latest-hero-meta { font-size: 12px; color: var(--text3); margin-bottom: 12px; }
  .latest-hero-tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .hero-tag {
    font-size: 11px; padding: 3px 10px; border-radius: 20px;
    background: rgba(77,159,255,.1); color: var(--blue); font-weight: 600;
  }

  /* ── Section Nav (horizontal scroll) ── */
  .sec-nav {
    display: flex; gap: 6px; padding: 12px 16px; overflow-x: auto;
    -webkit-overflow-scrolling: touch; scrollbar-width: none;
  }
  .sec-nav::-webkit-scrollbar { display: none; }
  .sec-nav-item {
    flex-shrink: 0; font-size: 12px; font-weight: 600; padding: 6px 14px;
    border-radius: 20px; border: 1px solid var(--border); background: var(--card);
    color: var(--text2); cursor: pointer; transition: all .2s; white-space: nowrap;
    font-family: inherit;
  }
  .sec-nav-item.active {
    background: var(--blue); color: #fff; border-color: var(--blue);
    box-shadow: 0 2px 8px rgba(77,159,255,.3);
  }
  .sec-nav-item:active { transform: scale(.95); }

  /* ── Intel cards (mobile) ── */
  .intel-list { padding: 0 12px 20px; }
  .m-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 14px 16px; margin-bottom: 10px; transition: all .2s;
  }
  .m-card:active { transform: scale(.985); }
  .m-card-top { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 8px; }
  .m-badge {
    flex-shrink: 0; font-size: 10px; font-weight: 700; padding: 2px 8px;
    border-radius: 5px; letter-spacing: .3px; white-space: nowrap; margin-top: 3px;
  }
  .badge-重大 { background: rgba(255,77,106,.12); color: var(--red); }
  .badge-项目 { background: rgba(77,159,255,.12); color: var(--blue); }
  .badge-技术 { background: rgba(34,211,238,.12); color: var(--cyan); }
  .badge-政策 { background: rgba(52,211,153,.12); color: var(--green); }
  .badge-供应链 { background: rgba(255,140,66,.12); color: var(--orange); }
  .badge-观点 { background: rgba(167,139,250,.12); color: var(--purple); }
  .badge-招投标 { background: rgba(244,114,182,.12); color: var(--pink); }
  .badge-数据 { background: rgba(251,191,36,.12); color: var(--yellow); }
  .m-title { font-size: 15px; font-weight: 700; line-height: 1.45; flex: 1; }
  .m-title mark { background: rgba(77,159,255,.15); color: var(--blue); border-radius: 2px; padding: 0 2px; }
  .m-body {
    font-size: 13px; color: var(--text2); line-height: 1.7; margin-bottom: 8px;
    display: -webkit-box; -webkit-box-orient: vertical; overflow: hidden;
  }
  .m-body.collapsed { -webkit-line-clamp: 3; }
  .m-body mark { background: rgba(77,159,255,.15); color: var(--blue); border-radius: 2px; padding: 0 2px; }
  .m-expand {
    font-size: 12px; color: var(--blue); font-weight: 600; cursor: pointer;
    margin-bottom: 8px; display: none;
  }
  .m-insight {
    font-size: 12px; color: var(--blue); font-weight: 500; padding: 8px 12px;
    background: rgba(77,159,255,.06); border-radius: 8px;
    border-left: 3px solid var(--blue); margin-bottom: 8px; line-height: 1.55;
  }
  .m-footer { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 6px; }
  .m-source { font-size: 12px; color: var(--text3); }
  .m-source a { color: var(--blue); border-bottom: 1px dashed rgba(77,159,255,.3); }
  .m-tags { display: flex; gap: 4px; flex-wrap: wrap; }
  .m-tag {
    font-size: 10px; padding: 2px 7px; border-radius: 4px;
    background: rgba(77,159,255,.08); color: var(--text3); font-weight: 500;
  }

  /* ═══ Issues View ═══ */
  .issues-list { padding: 12px; }
  .m-issue {
    display: flex; align-items: center; gap: 14px;
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 14px 16px; margin-bottom: 10px; text-decoration: none; color: inherit;
    transition: all .2s;
  }
  .m-issue:active { transform: scale(.985); }
  .m-issue-date { text-align: center; flex-shrink: 0; min-width: 48px; }
  .m-issue-month { font-size: 11px; color: var(--blue); font-weight: 700; text-transform: uppercase; }
  .m-issue-day { font-size: 26px; font-weight: 800; line-height: 1.1; }
  .m-issue-info { flex: 1; min-width: 0; }
  .m-issue-title {
    font-size: 14px; font-weight: 700; line-height: 1.4; margin-bottom: 6px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;

  .m-issue-meta { display: flex; flex-wrap: wrap; gap: 5px; }
  .m-issue-tag {
    font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 5px;

  .tag-intel { background: rgba(77,159,255,.1); color: var(--blue); }
  .tag-amount { background: rgba(52,211,153,.1); color: var(--green); }
  .m-issue-arrow { color: var(--text3); font-size: 16px; flex-shrink: 0; }

  /* ═══ Stats View ═══ */
  .stats-wrap { padding: 16px; }
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .stat-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 16px; text-align: center;
  }
  .stat-card .num { font-size: 28px; font-weight: 800; margin-bottom: 2px; }
  .stat-card .label { font-size: 12px; color: var(--text3); }
  .stats-section-title { font-size: 15px; font-weight: 700; margin-bottom: 12px; }
  .tag-cloud { display: flex; flex-wrap: wrap; gap: 8px; }
  .tag-cloud-item {
    font-size: 13px; padding: 6px 14px; border-radius: 20px;
    background: var(--card); border: 1px solid var(--border); color: var(--text2);
    cursor: pointer; transition: all .2s; font-weight: 500;
  }
  .tag-cloud-item:active { background: rgba(77,159,255,.1); border-color: var(--blue); color: var(--blue); }

  /* ═══ No results ═══ */
  .no-results {
    text-align: center; padding: 48px 20px; color: var(--text3); font-size: 14px;
    display: none;
  }
  .no-results .emoji { font-size: 40px; display: block; margin-bottom: 10px; }

  /* ═══ Search results count ═══ */
  .search-count { text-align: center; padding: 8px 16px; font-size: 12px; color: var(--text3); min-height: 16px; }

  /* ═══ Footer ═══ */
  .m-footer-info {
    text-align: center; padding: 20px 16px 12px; color: var(--text3); font-size: 11px; line-height: 1.8;
  }
</style>
<script>
(function(){

// ══════════════════════════════════════════════
// THEME
// ══════════════════════════════════════════════
function getTheme() { return localStorage.getItem('idc-theme') || 'light'; }

function toggleTheme() {
  var next = getTheme() === 'dark' ? 'light' : 'dark';
  if (next === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
  } else {
    document.documentElement.removeAttribute('data-theme');
  }
  localStorage.setItem('idc-theme', next);
  document.getElementById('themeBtn').textContent = next === 'dark' ? '🌙' : '☀️';
}

(function() {
  var t = getTheme();
  document.getElementById('themeBtn').textContent = t === 'dark' ? '🌙' : '☀️';
})();

// ══════════════════════════════════════════════
// TAB SWITCHING
// ══════════════════════════════════════════════
function switchTab(viewId) {
  document.querySelectorAll('.view').forEach(function(v) { v.classList.remove('active'); });
  document.querySelectorAll('.tab-item').forEach(function(t) { t.classList.remove('active'); });
  document.getElementById(viewId).classList.add('active');
  document.querySelector('.tab-item[data-view="' + viewId + '"]').classList.add('active');
  window.scrollTo(0, 0);
}

// ══════════════════════════════════════════════
// RENDER: Latest Issue Hero
// ══════════════════════════════════════════════
function renderLatestHero() {
  if (ISSUES.length === 0) return;
  var latest = ISSUES[0];
  var tagsHtml = latest.tags.map(function(t) { return '<span class="hero-tag">' + t + '</span>'; }).join('');
  document.getElementById('latestHero').innerHTML =
    '<div class="latest-hero-title">' + latest.title + '</div>' +
    '<div class="latest-hero-meta">' + latest.dateRange + ' · ' + latest.intelCount + ' 条情报 · ¥' + latest.totalAmount + '</div>' +
    '<div class="latest-hero-tags">' + tagsHtml + '</div>';
}

// ══════════════════════════════════════════════
// RENDER: Section Nav (horizontal pills)
// ══════════════════════════════════════════════
var activeSec = '全部';

function renderSecNav() {
  if (ISSUES.length === 0) return;
  var latest = ISSUES[0];
  var items = INTEL_ITEMS.filter(function(i) { return i.issueId === latest.id; });

  // Get unique sections in order
  var sectionOrder = ['全部','重大','项目','技术','政策','供应链','观点','招投标','数据'];
  var existingSections = {};
  items.forEach(function(i) { existingSections[i.section] = true; });

  var navHtml = '';
  sectionOrder.forEach(function(sec) {
    if (sec !== '全部' && !existingSections[sec]) return;
    var count = sec === '全部' ? items.length : items.filter(function(i) { return i.section === sec; }).length;
    var cls = activeSec === sec ? ' active' : '';
    navHtml += '<button class="sec-nav-item' + cls + '" data-sec="' + sec + '" onclick="filterSection(\'' + sec + '\')">' +
      sec + (sec !== '全部' ? ' ' + count : '') + '</button>';
  });
  document.getElementById('secNav').innerHTML = navHtml;
}

function filterSection(sec) {
  activeSec = sec;
  renderSecNav();
  renderIntelList(currentQuery);
}

// ══════════════════════════════════════════════
// RENDER: Intel List (cards)
// ══════════════════════════════════════════════
function highlightText(text, query) {
  if (!query) return text;
  var escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp('(' + escaped + ')', 'gi'), '<mark>$1</mark>');
}

function renderIntelList(query) {
  var items = INTEL_ITEMS;
  if (ISSUES.length > 0 && !query) {
    items = INTEL_ITEMS.filter(function(i) { return i.issueId === ISSUES[0].id; });
  }

  // Filter by section
  if (activeSec !== '全部') {
    items = items.filter(function(i) { return i.section === activeSec; });
  }

  // Filter by search query
  if (query) {
    var lower = query.toLowerCase();
    items = items.filter(function(i) {
      return i.title.toLowerCase().indexOf(lower) !== -1 ||
        i.body.toLowerCase().indexOf(lower) !== -1 ||
        i.tags.some(function(t) { return t.toLowerCase().indexOf(lower) !== -1; }) ||
        i.section.toLowerCase().indexOf(lower) !== -1;
    });
  }

  var noResults = document.getElementById('noResults');
  var searchCount = document.getElementById('searchCount');

  if (items.length === 0) {
    document.getElementById('intelList').innerHTML = '';
    noResults.style.display = 'block';
    document.getElementById('noResultsText').textContent = query ? '没有找到包含「' + query + '」的情报' : '该板块暂无情报';
    searchCount.textContent = '';
    return;
  }

  noResults.style.display = 'none';
  if (query) {
    searchCount.textContent = '找到 ' + items.length + ' 条相关情报';
  } else {
    searchCount.textContent = '';
  }

  document.getElementById('intelList').innerHTML = items.map(function(item, idx) {
    var titleHtml = highlightText(item.title, query);
    var bodyHtml = highlightText(item.body, query);
    var insightHtml = item.insight
      ? '<div class="m-insight">💡 ' + item.insight + '</div>' : '';
    var sourceHtml = '';
    if (item.sourceUrl) {
      sourceHtml = '<div class="m-source">📎 <a href="' + item.sourceUrl + '" target="_blank">' + item.sourceLabel + '</a></div>';
    } else if (item.sourceLabel) {
      sourceHtml = '<div class="m-source">📎 ' + item.sourceLabel + '</div>';
    }
    var tagsHtml = item.tags.slice(0, 4).map(function(t) { return '<span class="m-tag">' + t + '</span>'; }).join('');

    return '<div class="m-card">' +
      '<div class="m-card-top">' +
        '<span class="m-badge badge-' + item.section + '">' + item.section + '</span>' +
        '<div class="m-title">' + titleHtml + '</div>' +
      '</div>' +
      '<div class="m-body collapsed" id="body-' + idx + '">' + bodyHtml + '</div>' +
      '<div class="m-expand" id="expand-' + idx + '" onclick="toggleExpand(' + idx + ')">展开全文 ▾</div>' +
      insightHtml +
      '<div class="m-footer">' +
        sourceHtml +
        '<div class="m-tags">' + tagsHtml + '</div>' +
      '</div>' +
    '</div>';
  }).join('');

  // Check which cards need expand button
  setTimeout(function() {
    items.forEach(function(_, idx) {
      var body = document.getElementById('body-' + idx);
      var expand = document.getElementById('expand-' + idx);
      if (body && expand && body.scrollHeight > body.clientHeight + 4) {
        expand.style.display = 'block';
      }
    });
  }, 50);
}

function toggleExpand(idx) {
  var body = document.getElementById('body-' + idx);
  var expand = document.getElementById('expand-' + idx);
  if (body.classList.contains('collapsed')) {
    body.classList.remove('collapsed');
    expand.textContent = '收起 ▴';
  } else {
    body.classList.add('collapsed');
    expand.textContent = '展开全文 ▾';
  }
}

// ══════════════════════════════════════════════
// RENDER: Issues List
// ══════════════════════════════════════════════
function renderIssuesList() {
  var months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  document.getElementById('issuesList').innerHTML = ISSUES.map(function(issue) {
    var d = new Date(issue.date + 'T00:00:00');
    return '<a class="m-issue" href="' + issue.file + '">' +
      '<div class="m-issue-date">' +
        '<div class="m-issue-month">' + months[d.getMonth()] + '</div>' +
        '<div class="m-issue-day">' + d.getDate() + '</div>' +
      '</div>' +
      '<div class="m-issue-info">' +
        '<div class="m-issue-title">' + issue.title + '</div>' +
        '<div class="m-issue-meta">' +
          '<span class="m-issue-tag tag-intel">' + issue.intelCount + ' 条</span>' +
          '<span class="m-issue-tag tag-amount">¥' + issue.totalAmount + '</span>' +
        '</div>' +
      '</div>' +
      '<span class="m-issue-arrow">›</span>' +
    '</a>';
  }).join('');
}

// ══════════════════════════════════════════════
// RENDER: Stats
// ══════════════════════════════════════════════
function renderStats() {
  // Count sections
  var sectionCounts = {};
  INTEL_ITEMS.forEach(function(i) {
    sectionCounts[i.section] = (sectionCounts[i.section] || 0) + 1;
  });

  // Collect all tags
  var tagCounts = {};
  INTEL_ITEMS.forEach(function(i) {
    i.tags.forEach(function(t) {
      tagCounts[t] = (tagCounts[t] || 0) + 1;
    });
  });
  var sortedTags = Object.keys(tagCounts).sort(function(a, b) { return tagCounts[b] - tagCounts[a]; });

  var html = '';

  // Stats grid
  html += '<div class="stats-grid">';
  html += '<div class="stat-card"><div class="num" style="color:var(--blue);">' + ISSUES.length + '</div><div class="label">已发布期刊</div></div>';
  html += '<div class="stat-card"><div class="num" style="color:var(--purple);">' + INTEL_ITEMS.length + '</div><div class="label">累计情报</div></div>';
  html += '<div class="stat-card"><div class="num" style="color:var(--green);">8</div><div class="label">覆盖板块</div></div>';
  html += '<div class="stat-card"><div class="num" style="color:var(--orange);">' + sortedTags.length + '</div><div class="label">标签数</div></div>';
  html += '</div>';

  // Section breakdown
  html += '<div class="stats-section-title">📊 板块分布</div>';
  html += '<div style="margin-bottom:20px;">';
  var sectionNames = {'重大':'🔴 重大信号','项目':'🏗️ 项目与市场','技术':'⚙️ 技术趋势','政策':'📜 政策法规','供应链':'🔗 供应链','观点':'💬 观点','招投标':'📋 招投标','数据':'📈 数据'};
  Object.keys(sectionCounts).forEach(function(sec) {
    var pct = Math.round(sectionCounts[sec] / INTEL_ITEMS.length * 100);
    html += '<div style="margin-bottom:8px;">';
    html += '<div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px;">';
    html += '<span>' + (sectionNames[sec] || sec) + '</span>';
    html += '<span style="color:var(--text3);">' + sectionCounts[sec] + ' 条 · ' + pct + '%</span>';
    html += '</div>';
    html += '<div style="height:6px;background:var(--border);border-radius:3px;overflow:hidden;">';
    html += '<div style="height:100%;width:' + pct + '%;background:var(--blue);border-radius:3px;transition:width .3s;"></div>';
    html += '</div>';
    html += '</div>';
  });
  html += '</div>';

  // Tag cloud
  html += '<div class="stats-section-title">🏷️ 热门标签</div>';
  html += '<div class="tag-cloud">';
  sortedTags.slice(0, 24).forEach(function(tag) {
    html += '<span class="tag-cloud-item" onclick="tagSearch(\'' + tag.replace(/'/g, "\\'") + '\')">' + tag + ' <span style="color:var(--text3);font-size:11px;">' + tagCounts[tag] + '</span></span>';
  });
  html += '</div>';

  document.getElementById('statsWrap').innerHTML = html;
}

function tagSearch(tag) {
  switchTab('viewLatest');
  document.getElementById('searchInput').value = tag;
  onSearch();
}

// ══════════════════════════════════════════════
// SEARCH
// ══════════════════════════════════════════════
var currentQuery = '';

function onSearch() {
  var q = document.getElementById('searchInput').value.trim();
  currentQuery = q;
  var clear = document.getElementById('searchClear');
  clear.style.display = q ? 'flex' : 'none';

  if (!q) {
    activeSec = '全部';
    renderSecNav();
    document.getElementById('latestHero').parentElement.querySelector('.latest-hero') && (document.getElementById('latestHero').style.display = '');
    document.getElementById('secNav').style.display = '';
  } else {
    document.getElementById('latestHero').style.display = 'none';
  }

  renderIntelList(q);
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  currentQuery = '';
  document.getElementById('searchClear').style.display = 'none';
  document.getElementById('searchCount').textContent = '';
  document.getElementById('latestHero').style.display = '';
  document.getElementById('secNav').style.display = '';
  activeSec = '全部';
  renderSecNav();
  renderIntelList('');
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
renderLatestHero();
renderSecNav();
renderIntelList('');
renderIssuesList();
renderStats();
</script>
