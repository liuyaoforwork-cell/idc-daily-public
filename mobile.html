</style>

// ══════════════════════════════════════════════
// THEME
// ══════════════════════════════════════════════
function getTheme() { return localStorage.getItem('idc-theme') || 'light'; }

function toggleTheme() {
  var next = getTheme() === 'dark' ? 'light' : 'dark';
  if (next === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
  } else {
    document.documentElement.removeAttribute('data-theme');
  }
  localStorage.setItem('idc-theme', next);
  document.getElementById('themeBtn').textContent = next === 'dark' ? '🌙' : '☀️';
}

(function() {
  var t = getTheme();
  document.getElementById('themeBtn').textContent = t === 'dark' ? '🌙' : '☀️';
})();

// ══════════════════════════════════════════════
// TAB SWITCHING
// ══════════════════════════════════════════════
function switchTab(viewId) {
  document.querySelectorAll('.view').forEach(function(v) { v.classList.remove('active'); });
  document.querySelectorAll('.tab-item').forEach(function(t) { t.classList.remove('active'); });
  document.getElementById(viewId).classList.add('active');
  document.querySelector('.tab-item[data-view="' + viewId + '"]').classList.add('active');
  window.scrollTo(0, 0);
}

// ══════════════════════════════════════════════
// RENDER: Latest Issue Hero
// ══════════════════════════════════════════════
function renderLatestHero() {
  if (ISSUES.length === 0) return;
  var latest = ISSUES[0];
  var tagsHtml = latest.tags.map(function(t) { return '<span class="hero-tag">' + t + '</span>'; }).join('');
  document.getElementById('latestHero').innerHTML =
    '<div class="latest-hero-title">' + latest.title + '</div>' +
    '<div class="latest-hero-meta">' + latest.dateRange + ' · ' + latest.intelCount + ' 条情报 · ¥' + latest.totalAmount + '</div>' +
    '<div class="latest-hero-tags">' + tagsHtml + '</div>';
}

// ══════════════════════════════════════════════
// RENDER: Section Nav (horizontal pills)
// ══════════════════════════════════════════════
var activeSec = '全部';

function renderSecNav() {
  if (ISSUES.length === 0) return;
  var latest = ISSUES[0];
  var items = INTEL_ITEMS.filter(function(i) { return i.issueId === latest.id; });

  // Get unique sections in order
  var sectionOrder = ['全部','重大','项目','技术','政策','供应链','观点','招投标','数据'];
  var existingSections = {};
  items.forEach(function(i) { existingSections[i.section] = true; });

  var navHtml = '';
  sectionOrder.forEach(function(sec) {
    if (sec !== '全部' && !existingSections[sec]) return;
    var count = sec === '全部' ? items.length : items.filter(function(i) { return i.section === sec; }).length;
    var cls = activeSec === sec ? ' active' : '';
    navHtml += '<button class="sec-nav-item' + cls + '" data-sec="' + sec + '" onclick="filterSection(\'' + sec + '\')">' +
      sec + (sec !== '全部' ? ' ' + count : '') + '</button>';
  });
  document.getElementById('secNav').innerHTML = navHtml;
}

function filterSection(sec) {
  activeSec = sec;
  renderSecNav();
  renderIntelList(currentQuery);
}

// ══════════════════════════════════════════════
// RENDER: Intel List (cards)
// ══════════════════════════════════════════════
function highlightText(text, query) {
  if (!query) return text;
  var escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp('(' + escaped + ')', 'gi'), '<mark>$1</mark>');
}

function renderIntelList(query) {
  var items = INTEL_ITEMS;
  if (ISSUES.length > 0 && !query) {
    items = INTEL_ITEMS.filter(function(i) { return i.issueId === ISSUES[0].id; });
  }

  // Filter by section
  if (activeSec !== '全部') {
    items = items.filter(function(i) { return i.section === activeSec; });
  }

  // Filter by search query
  if (query) {
    var lower = query.toLowerCase();
    items = items.filter(function(i) {
      return i.title.toLowerCase().indexOf(lower) !== -1 ||
        i.body.toLowerCase().indexOf(lower) !== -1 ||
        i.tags.some(function(t) { return t.toLowerCase().indexOf(lower) !== -1; }) ||
        i.section.toLowerCase().indexOf(lower) !== -1;
    });
  }

  var noResults = document.getElementById('noResults');
  var searchCount = document.getElementById('searchCount');

  if (items.length === 0) {
    document.getElementById('intelList').innerHTML = '';
    noResults.style.display = 'block';
    document.getElementById('noResultsText').textContent = query ? '没有找到包含「' + query + '」的情报' : '该板块暂无情报';
    searchCount.textContent = '';
    return;
  }

  noResults.style.display = 'none';
  if (query) {
    searchCount.textContent = '找到 ' + items.length + ' 条相关情报';
  } else {
    searchCount.textContent = '';
  }

  document.getElementById('intelList').innerHTML = items.map(function(item, idx) {
    var titleHtml = highlightText(item.title, query);
    var bodyHtml = highlightText(item.body, query);
    var insightHtml = item.insight
      ? '<div class="m-insight">💡 ' + item.insight + '</div>' : '';
    var sourceHtml = '';
    if (item.sourceUrl) {
      sourceHtml = '<div class="m-source">📎 <a href="' + item.sourceUrl + '" target="_blank">' + item.sourceLabel + '</a></div>';
    } else if (item.sourceLabel) {
      sourceHtml = '<div class="m-source">📎 ' + item.sourceLabel + '</div>';
    }
    var tagsHtml = item.tags.slice(0, 4).map(function(t) { return '<span class="m-tag">' + t + '</span>'; }).join('');

    return '<div class="m-card">' +
      '<div class="m-card-top">' +
        '<span class="m-badge badge-' + item.section + '">' + item.section + '</span>' +
        '<div class="m-title">' + titleHtml + '</div>' +
      '</div>' +
      '<div class="m-body collapsed" id="body-' + idx + '">' + bodyHtml + '</div>' +
      '<div class="m-expand" id="expand-' + idx + '" onclick="toggleExpand(' + idx + ')">展开全文 ▾</div>' +
      insightHtml +
      '<div class="m-footer">' +
        sourceHtml +
        '<div class="m-tags">' + tagsHtml + '</div>' +
      '</div>' +
    '</div>';
  }).join('');

  // Check which cards need expand button
  setTimeout(function() {
    items.forEach(function(_, idx) {
      var body = document.getElementById('body-' + idx);
      var expand = document.getElementById('expand-' + idx);
      if (body && expand && body.scrollHeight > body.clientHeight + 4) {
        expand.style.display = 'block';
      }
    });
  }, 50);
}

function toggleExpand(idx) {
  var body = document.getElementById('body-' + idx);
  var expand = document.getElementById('expand-' + idx);
  if (body.classList.contains('collapsed')) {
    body.classList.remove('collapsed');
    expand.textContent = '收起 ▴';
  } else {
    body.classList.add('collapsed');
    expand.textContent = '展开全文 ▾';
  }
}

// ══════════════════════════════════════════════
// RENDER: Issues List
// ══════════════════════════════════════════════
function renderIssuesList() {
  var months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  document.getElementById('issuesList').innerHTML = ISSUES.map(function(issue) {
    var d = new Date(issue.date + 'T00:00:00');
    return '<a class="m-issue" href="' + issue.file + '">' +
      '<div class="m-issue-date">' +
        '<div class="m-issue-month">' + months[d.getMonth()] + '</div>' +
        '<div class="m-issue-day">' + d.getDate() + '</div>' +
      '</div>' +
      '<div class="m-issue-info">' +
        '<div class="m-issue-title">' + issue.title + '</div>' +
        '<div class="m-issue-meta">' +
          '<span class="m-issue-tag tag-intel">' + issue.intelCount + ' 条</span>' +
          '<span class="m-issue-tag tag-amount">¥' + issue.totalAmount + '</span>' +
        '</div>' +
      '</div>' +
      '<span class="m-issue-arrow">›</span>' +
    '</a>';
  }).join('');
}

// ══════════════════════════════════════════════
// RENDER: Stats
// ══════════════════════════════════════════════
function renderStats() {
  // Count sections
  var sectionCounts = {};
  INTEL_ITEMS.forEach(function(i) {
    sectionCounts[i.section] = (sectionCounts[i.section] || 0) + 1;
  });

  // Collect all tags
  var tagCounts = {};
  INTEL_ITEMS.forEach(function(i) {
    i.tags.forEach(function(t) {
      tagCounts[t] = (tagCounts[t] || 0) + 1;
    });
  });
  var sortedTags = Object.keys(tagCounts).sort(function(a, b) { return tagCounts[b] - tagCounts[a]; });

  var html = '';

  // Stats grid
  html += '<div class="stats-grid">';
  html += '<div class="stat-card"><div class="num" style="color:var(--blue);">' + ISSUES.length + '</div><div class="label">已发布期刊</div></div>';
  html += '<div class="stat-card"><div class="num" style="color:var(--purple);">' + INTEL_ITEMS.length + '</div><div class="label">累计情报</div></div>';
  html += '<div class="stat-card"><div class="num" style="color:var(--green);">8</div><div class="label">覆盖板块</div></div>';
  html += '<div class="stat-card"><div class="num" style="color:var(--orange);">' + sortedTags.length + '</div><div class="label">标签数</div></div>';
  html += '</div>';

  // Section breakdown
  html += '<div class="stats-section-title">📊 板块分布</div>';
  html += '<div style="margin-bottom:20px;">';
  var sectionNames = {'重大':'🔴 重大信号','项目':'🏗️ 项目与市场','技术':'⚙️ 技术趋势','政策':'📜 政策法规','供应链':'🔗 供应链','观点':'💬 观点','招投标':'📋 招投标','数据':'📈 数据'};
  Object.keys(sectionCounts).forEach(function(sec) {
    var pct = Math.round(sectionCounts[sec] / INTEL_ITEMS.length * 100);
    html += '<div style="margin-bottom:8px;">';
    html += '<div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px;">';
    html += '<span>' + (sectionNames[sec] || sec) + '</span>';
    html += '<span style="color:var(--text3);">' + sectionCounts[sec] + ' 条 · ' + pct + '%</span>';
    html += '</div>';
    html += '<div style="height:6px;background:var(--border);border-radius:3px;overflow:hidden;">';
    html += '<div style="height:100%;width:' + pct + '%;background:var(--blue);border-radius:3px;transition:width .3s;"></div>';
    html += '</div>';
    html += '</div>';
  });
  html += '</div>';

  // Tag cloud
  html += '<div class="stats-section-title">🏷️ 热门标签</div>';
  html += '<div class="tag-cloud">';
  sortedTags.slice(0, 24).forEach(function(tag) {
    html += '<span class="tag-cloud-item" onclick="tagSearch(\'' + tag.replace(/'/g, "\\'") + '\')">' + tag + ' <span style="color:var(--text3);font-size:11px;">' + tagCounts[tag] + '</span></span>';
  });
  html += '</div>';

  document.getElementById('statsWrap').innerHTML = html;
}

function tagSearch(tag) {
  switchTab('viewLatest');
  document.getElementById('searchInput').value = tag;
  onSearch();
}

// ══════════════════════════════════════════════
// SEARCH
// ══════════════════════════════════════════════
var currentQuery = '';

function onSearch() {
  var q = document.getElementById('searchInput').value.trim();
  currentQuery = q;
  var clear = document.getElementById('searchClear');
  clear.style.display = q ? 'flex' : 'none';

  if (!q) {
    activeSec = '全部';
    renderSecNav();
    document.getElementById('latestHero').parentElement.querySelector('.latest-hero') && (document.getElementById('latestHero').style.display = '');
    document.getElementById('secNav').style.display = '';
  } else {
    document.getElementById('latestHero').style.display = 'none';
  }

  renderIntelList(q);
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  currentQuery = '';
  document.getElementById('searchClear').style.display = 'none';
  document.getElementById('searchCount').textContent = '';
  document.getElementById('latestHero').style.display = '';
  document.getElementById('secNav').style.display = '';
  activeSec = '全部';
  renderSecNav();
  renderIntelList('');
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
renderLatestHero();
renderSecNav();
renderIntelList('');
renderIssuesList();
renderStats();
</script>
