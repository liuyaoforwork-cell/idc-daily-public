<meta name="description" content="IDC数据中心行业情报周报，移动端专属阅读体验。">

<style>
  /* ═══ CSS Variables ═══ */
  :root {
    --bg: #f5f6fa; --bg2: #fff; --card: #fff;
    --border: #e8ebf2; --text: #1a1d2e; --text2: #5a5e73; --text3: #8b8fa3;
    --blue: #4d9fff; --red: #ff4d6a; --green: #34d399; --purple: #a78bfa;
    --orange: #ff8c42; --cyan: #22d3ee; --yellow: #fbbf24; --pink: #f472b6;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  [data-theme="dark"] {
    --bg: #0f1117; --bg2: #161824; --card: #1a1d2e;
    --border: #2a2e45; --text: #e2e4ed; --text2: #8b8fa3; --text3: #5a5e73;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html { font-size:16px; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: var(--bg); color: var(--text); line-height:1.65;
    -webkit-font-smoothing: antialiased; transition: background .3s, color .3s;
    padding-bottom: calc(64px + var(--safe-bottom));
    padding-top: var(--safe-top);
    overscroll-behavior-y: contain;
  }
  a { color: var(--blue); text-decoration: none; }

  /* ═══ Header ═══ */
  .header {
    position: sticky; top: 0; z-index: 100;
    background: var(--bg); padding: 12px 16px 0;
    border-bottom: 1px solid var(--border);
  }
  .header-top {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px;
  }
  .header-brand { display: flex; align-items: center; gap: 8px; }
  .header-brand .icon { font-size: 22px; }
  .header-brand .name { font-size: 17px; font-weight: 700; }
  .header-actions { display: flex; align-items: center; gap: 10px; }
  .theme-btn {
    width: 36px; height: 36px; border-radius: 10px; border: 1px solid var(--border);
    background: var(--card); display: flex; align-items: center; justify-content: center;
    font-size: 18px; cursor: pointer; transition: all .2s;
  }
  .theme-btn:active { transform: scale(.92); }
  .desktop-link {
    font-size: 12px; color: var(--text3); padding: 6px 10px; border: 1px solid var(--border);
    border-radius: 8px; background: var(--card); white-space: nowrap;
  }

  /* ── Search ── */
  .search-wrap { padding: 0 0 12px; }
  .search-box {
    display: flex; align-items: center; gap: 8px;
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 10px 14px; transition: border-color .2s;
  }
  .search-box:focus-within { border-color: var(--blue); }
  .search-box svg { flex-shrink: 0; color: var(--text3); width: 16px; height: 16px; }
  .search-box input {
    flex: 1; border: none; background: transparent; color: var(--text);
    font-size: 15px; outline: none; font-family: inherit;
  }
  .search-box input::placeholder { color: var(--text3); }
  .search-clear {
    display: none; width: 22px; height: 22px; border-radius: 6px; border: none;
    background: var(--border); color: var(--text2); cursor: pointer; font-size: 12px;
    align-items: center; justify-content: center;
  }

  /* ═══ Tab bar (bottom) ═══ */
  .tab-bar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
    background: var(--bg2); border-top: 1px solid var(--border);
    display: flex; padding-bottom: var(--safe-bottom);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  }
  .tab-item {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px;
    padding: 8px 0 6px; cursor: pointer; transition: all .15s;
    color: var(--text3); font-size: 10px; font-weight: 600; border: none; background: none;
    font-family: inherit;
  }
  .tab-item.active { color: var(--blue); }
  .tab-item .tab-icon { font-size: 20px; line-height: 1; }

  /* ═══ Views ═══ */
  .view { display: none; }
  .view.active { display: block; }

  /* ═══ Latest View ═══ */
  .latest-hero {
    padding: 20px 16px; background: linear-gradient(135deg, rgba(77,159,255,.08), rgba(167,139,250,.06));
  }
  .latest-hero-title { font-size: 18px; font-weight: 800; margin-bottom: 6px; line-height: 1.4; }
  [data-theme="dark"] .latest-hero-title {
    background: linear-gradient(135deg, #fff, #a0aec0); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .latest-hero-meta { font-size: 12px; color: var(--text3); margin-bottom: 12px; }
  .latest-hero-tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .hero-tag {
    font-size: 11px; padding: 3px 10px; border-radius: 20px;
    background: rgba(77,159,255,.1); color: var(--blue); font-weight: 600;
  }

  /* ── Section Nav (horizontal scroll) ── */
  .sec-nav {
    display: flex; gap: 6px; padding: 12px 16px; overflow-x: auto;
    -webkit-overflow-scrolling: touch; scrollbar-width: none;
  }
  .sec-nav::-webkit-scrollbar { display: none; }
  .sec-nav-item {
    flex-shrink: 0; font-size: 12px; font-weight: 600; padding: 6px 14px;
    border-radius: 20px; border: 1px solid var(--border); background: var(--card);
    color: var(--text2); cursor: pointer; transition: all .2s; white-space: nowrap;
    font-family: inherit;
  }
  .sec-nav-item.active {
    background: var(--blue); color: #fff; border-color: var(--blue);
    box-shadow: 0 2px 8px rgba(77,159,255,.3);
  }
  .sec-nav-item:active { transform: scale(.95); }

  /* ── Intel cards (mobile) ── */
  .intel-list { padding: 0 12px 20px; }
  .m-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 14px 16px; margin-bottom: 10px; transition: all .2s;
  }
  .m-card:active { transform: scale(.985); }
  .m-card-top { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 8px; }
  .m-badge {
    flex-shrink: 0; font-size: 10px; font-weight: 700; padding: 2px 8px;
    border-radius: 5px; letter-spacing: .3px; white-space: nowrap; margin-top: 3px;
  }
  .badge-重大 { background: rgba(255,77,106,.12); color: var(--red); }
  .badge-项目 { background: rgba(77,159,255,.12); color: var(--blue); }
  .badge-技术 { background: rgba(34,211,238,.12); color: var(--cyan); }
  .badge-政策 { background: rgba(52,211,153,.12); color: var(--green); }
  .badge-供应链 { background: rgba(255,140,66,.12); color: var(--orange); }
  .badge-观点 { background: rgba(167,139,250,.12); color: var(--purple); }
  .badge-招投标 { background: rgba(244,114,182,.12); color: var(--pink); }
  .badge-数据 { background: rgba(251,191,36,.12); color: var(--yellow); }
  .m-title { font-size: 15px; font-weight: 700; line-height: 1.45; flex: 1; }
  .m-title mark { background: rgba(77,159,255,.15); color: var(--blue); border-radius: 2px; padding: 0 2px; }
  .m-body {
    font-size: 13px; color: var(--text2); line-height: 1.7; margin-bottom: 8px;
    display: -webkit-box; -webkit-box-orient: vertical; overflow: hidden;
  }
  .m-body.collapsed { -webkit-line-clamp: 3; }
  .m-body mark { background: rgba(77,159,255,.15); color: var(--blue); border-radius: 2px; padding: 0 2px; }
  .m-expand {
    font-size: 12px; color: var(--blue); font-weight: 600; cursor: pointer;
    margin-bottom: 8px; display: none;
  }
  .m-insight {
    font-size: 12px; color: var(--blue); font-weight: 500; padding: 8px 12px;
    background: rgba(77,159,255,.06); border-radius: 8px;
    border-left: 3px solid var(--blue); margin-bottom: 8px; line-height: 1.55;
  }
  .m-footer { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 6px; }
  .m-source { font-size: 12px; color: var(--text3); }
  .m-source a { color: var(--blue); border-bottom: 1px dashed rgba(77,159,255,.3); }
  .m-tags { display: flex; gap: 4px; flex-wrap: wrap; }
  .m-tag {
    font-size: 10px; padding: 2px 7px; border-radius: 4px;
    background: rgba(77,159,255,.08); color: var(--text3); font-weight: 500;
  }

  /* ═══ Issues View ═══ */
  .issues-list { padding: 12px; }
  .m-issue {
    display: flex; align-items: center; gap: 14px;
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 14px 16px; margin-bottom: 10px; text-decoration: none; color: inherit;
    transition: all .2s;
  }
  .m-issue:active { transform: scale(.985); }
  .m-issue-date { text-align: center; flex-shrink: 0; min-width: 48px; }
  .m-issue-month { font-size: 11px; color: var(--blue); font-weight: 700; text-transform: uppercase; }
  .m-issue-day { font-size: 26px; font-weight: 800; line-height: 1.1; }
  .m-issue-info { flex: 1; min-width: 0; }
  .m-issue-title {
    font-size: 14px; font-weight: 700; line-height: 1.4; margin-bottom: 6px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .m-issue-meta { display: flex; flex-wrap: wrap; gap: 5px; }
  .m-issue-tag {
    font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 5px;
  }
  .tag-intel { background: rgba(77,159,255,.1); color: var(--blue); }
  .tag-amount { background: rgba(52,211,153,.1); color: var(--green); }
  .m-issue-arrow { color: var(--text3); font-size: 16px; flex-shrink: 0; }

  /* ═══ Stats View ═══ */
  .stats-wrap { padding: 16px; }
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .stat-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 16px; text-align: center;
  }
  .stat-card .num { font-size: 28px; font-weight: 800; margin-bottom: 2px; }
  .stat-card .label { font-size: 12px; color: var(--text3); }
  .stats-section-title { font-size: 15px; font-weight: 700; margin-bottom: 12px; }
  .tag-cloud { display: flex; flex-wrap: wrap; gap: 8px; }
  .tag-cloud-item {
    font-size: 13px; padding: 6px 14px; border-radius: 20px;
    background: var(--card); border: 1px solid var(--border); color: var(--text2);
    cursor: pointer; transition: all .2s; font-weight: 500;
  }
  .tag-cloud-item:active { background: rgba(77,159,255,.1); border-color: var(--blue); color: var(--blue); }

  /* ═══ No results ═══ */
  .no-results {
    text-align: center; padding: 48px 20px; color: var(--text3); font-size: 14px;
    display: none;
  }
  .no-results .emoji { font-size: 40px; display: block; margin-bottom: 10px; }

  /* ═══ Search results count ═══ */
  .search-count { text-align: center; padding: 8px 16px; font-size: 12px; color: var(--text3); min-height: 16px; }

  /* ═══ Footer ═══ */
  .m-footer-info {
    text-align: center; padding: 20px 16px 12px; color: var(--text3); font-size: 11px; line-height: 1.8;
  }
</style>
<script>
(function(){

})();

    <div class="stats-wrap" id="statsWrap"></div>
  </div>
</main>

<!-- Bottom Tab Bar -->
<nav class="tab-bar">
  <button class="tab-item active" data-view="viewLatest" onclick="switchTab('viewLatest')">

  <button class="tab-item" data-view="viewStats" onclick="switchTab('viewStats')">

</nav>

  {"issueId":"2026-04-05","issueDate":"2026-04-05","issueFile":"issues/2026-04-05.html","section":"重大","sectionAnchor":"sec-signal","sectionName":"🔥 重大信号","title":"黑石38亿美元收购数据中心开发商Rowan Digital 49%股权","body":"2026年4月3日，黑石集团（Blackstone）敲定对Rowan Digital Infrastructure 49%股权的收购协议，估值约38亿美元（不含债务）。Rowan专注于为超大规模客户开发数据中心，已筹集超40亿美元建设债务。黑石拟设立上市交易的数据中心投资载体。","insight":"黑石持续加码DC赛道，设立上市DC投资载体表明机构资本正加速将DC视为核心战略资产类别。","sourceLabel":"36氪/财联社","sourceUrl":"https://www.36kr.com/newsflashes/3750349781811975","tags":["黑石","Rowan","38亿美元","并购"]},
  {"issueId":"2026-04-05","issueDate":"2026-04-05","issueFile":"issues/2026-04-05.html","section":"重大","sectionAnchor":"sec-signal","sectionName":"🔥 重大信号","title":"美国议员提《AI数据中心暂停法案》：20MW以上项目全面停建","body":"美国参议员桑德斯与众议员AOC联合提出《AI数据中心暂停法案》，要求无限期暂停全美所有新建或升级的大型AI数据中心（≥20MW），直至国会通过全面AI监管法规。背景：弗吉尼亚州DC密集区居民电费暴涨267%。","insight":"虽通过概率低，但释放强烈政治信号——AI基础设施扩张的社会成本已进入美国国会议程。","sourceLabel":"虎嗅/百度百科","sourceUrl":"https://www.huxiu.com/article/4846466.html","tags":["美国","暂停法案","20MW","AOC","桑德斯"]},
  {"issueId":"2026-04-05","issueDate":"2026-04-05","issueFile":"issues/2026-04-05.html","section":"重大","sectionAnchor":"sec-signal","sectionName":"🔥 重大信号","title":"字节+阿里2026算力规划曝光：合计需求超3.5GW，液冷成标配","body":"IDC圈4月2日报道：字节跳动2026年国内IDC需求约<strong>1.5GW</strong>，Q1已完成1GW招标；阿里规划<strong>2GW</strong>，4月启动首批500MW。两家均以租赁为主（字节自建占比10%-15%），国产GPU比例显著提升（字节15%-20%，阿里20%-30%）。新招标强制要求液冷：字节95%机柜功率21kW、5%为50kW，超21kW必须上液冷。","insight":"3.5GW需求相当于35个百兆瓦级DC，液冷从加分项变为一票否决项。","sourceLabel":"中国IDC圈","sourceUrl":"https://news.idcquan.com/news/206696.shtml","tags":["字节跳动","阿里巴巴","3.5GW","液冷","国产GPU"]},
  {"issueId":"2026-04-05","issueDate":"2026-04-05","issueFile":"issues/2026-04-05.html","section":"项目","sectionAnchor":"sec-project","sectionName":"🏗️ 项目与市场","title":"JLL报告：2030年全球DC容量翻倍至200GW，未来5年投资3万亿美元","body":"仲量联行（JLL）发布《2026年全球数据中心展望》：全球DC总容量将从<strong>103GW</strong>增至<strong>200GW</strong>（2030年），未来5年投资<strong>3万亿美元</strong>（含1.2万亿房地产价值创造）。截至2025年底全球DC使用率<strong>97%</strong>，在建项目<strong>77%</strong>已获预租。中国DC市场2024年达<strong>3048亿元</strong>（CAGR 28.26%）。","insight":"97%使用率+77%预租率显示市场远未出现泡沫，DC已与传统商业地产平起平坐。","sourceLabel":"仲量联行","sourceUrl":"https://www.joneslanglasalle.com.cn/zh-cn/insights/2026-data-center-outlook","tags":["JLL","200GW","3万亿美元","97%使用率"]},
  {"issueId":"2026-04-05","issueDate":"2026-04-05","issueFile":"issues/2026-04-05.html","section":"项目","sectionAnchor":"sec-project","sectionName":"🏗️ 项目与市场","title":"华创AIDC研报：中国AIDC市场CAGR达58%，2027年将至1963亿元","body":"华创证券4月1日发布《Tokens爆发，推理需求开启全球AIDC新周期》：全球智能算力占比首超<strong>85%</strong>；中国AIDC市场2024年约<strong>494亿元</strong>，预计2027年增至<strong>1963亿元</strong>（CAGR 58%）；2026年2月中国模型Token用量<strong>4.12万亿</strong>首超美国2.94万亿；阿里2025-2027年投入超<strong>3800亿元</strong>。","insight":"AIDC正从IDC中分化为独立赛道，58%的CAGR意味着3年内市场翻4倍。","sourceLabel":"华创证券/同花顺","sourceUrl":"https://news.10jqka.com.cn/20260331/c675655841.shtml","tags":["AIDC","58%","1963亿","智能算力","华创证券"]},
  {"issueId":"2026-04-05","issueDate":"2026-04-05","issueFile":"issues/2026-04-05.html","section":"技术","sectionAnchor":"sec-tech","sectionName":"⚡ 技术趋势","title":"SemiAnalysis：内存占DC成本将达30%，四年翻近两番","body":"SemiAnalysis 4月3日报告：2026年内存（含HBM/DRAM）将占超大规模DC总资本支出约<strong>30%</strong>，而2023-2024年这一比例仅为<strong>8%</strong>。AI大模型训练和推理对内存带宽的极端需求是核心驱动因素。","insight":"内存成本占比从8%跃升至30%，DC建设成本结构正根本性重塑。","sourceLabel":"SemiAnalysis","sourceUrl":"https://www.semianalysis.com/","tags":["内存","30%","HBM","SemiAnalysis"]},
  {"issueId":"2026-04-05","issueDate":"2026-04-05","issueFile":"issues/2026-04-05.html","section":"技术","sectionAnchor":"sec-tech","sectionName":"⚡ 技术趋势","title":"海底数据中心纳入十五五创新支持，行业全景调研发布","body":"中研网4月3日发布数据中心行业全景调研报告：\"十五五\"期间（2026-2030年），国家支持海底数据中心等创新模式，推动算电一体、绿色集约的数字基础设施建设。UDC利用海洋冷源实现高效散热，结合海上风电直供可实现淡水零消耗。","insight":"海底DC从概念走向国家战略支持层面，对沿海城市IDC市场格局可能产生长期影响。","sourceLabel":"中研网","sourceUrl":"https://www.chinairn.com/news/20260403/11320263.shtml","tags":["海底DC","十五五","UDC","绿色"]},
  {"issueId":"2026-04-05","issueDate":"2026-04-05","issueFile":"issues/2026-04-05.html","section":"技术","sectionAnchor":"sec-tech","sectionName":"⚡ 技术趋势","title":"IDC Research：Vera Rubin平台重构DC架构，每瓦性能提升10倍","body":"IDC Research分析英伟达GTC 2026：Vera Rubin全栈计算平台（7款芯片+5款机架系统）实现每瓦性能较Blackwell提升<strong>10倍</strong>，将整个机架视为统一计算单元。新平台要求DC电力密度达到新高度，液冷为唯一散热方案。预计2026下半年出货。","insight":"10倍每瓦性能意味着单机架功率将进一步攀升，传统DC面临全面升级压力。","sourceLabel":"IDC Research","sourceUrl":"https://www.idc.com/resource-center/blog/","tags":["Vera Rubin","10倍","GTC 2026","液冷"]},
  {"issueId":"2026-04-05","issueDate":"2026-04-05","issueFile":"issues/2026-04-05.html","section":"政策","sectionAnchor":"sec-policy","sectionName":"📜 政策法规","title":"算电协同写入政府报告，枢纽节点新建DC绿电占比≥80%（强制）","body":"2026年全国两会首次将\"算电协同\"写入政府工作报告，明确国家枢纽节点新建DC<strong>绿电占比≥80%</strong>（从鼓励转强制）。庆阳绿电聚合试点：园区到户综合电价<strong>&lt;0.4元/kWh</strong>（全国均值0.66），直降<strong>40%</strong>；每年消纳绿电<strong>19.9亿kWh</strong>，减排CO₂ 161.57万吨。","insight":"80%绿电占比从鼓励变强制，是DC能源政策重大转折。庆阳模式将在其他枢纽节点复制。","sourceLabel":"CWESE/新华社","sourceUrl":"https://www.cwese.com/index.php?m=home&c=View&a=index&aid=1275","tags":["算电协同","80%绿电","庆阳","0.4元/kWh"]},
  {"issueId":"2026-04-05","issueDate":"2026-04-05","issueFile":"issues/2026-04-05.html","section":"政策","sectionAnchor":"sec-policy","sectionName":"📜 政策法规","title":"中国能源报：DC绿色低碳转型使其成为新型能源资产","body":"中国能源报3月30日发文：国际能源署研究显示，若DC具备运行灵活性（每年仅需灵活调节1%时间），到2035年前新增DC可完全不增加电网额外负担。DC正从\"能耗大户\"转型为\"新型能源资产\"。","insight":"定性转变意义重大——DC从被动能耗管控对象变为主动电网灵活性资源。","sourceLabel":"中国能源报/人民日报社","sourceUrl":"https://paper.people.com.cn/zgnyb/pc/content/202603/30/content_30148761.html","tags":["新型能源资产","IEA","电网灵活性"]},
  {"issueId":"2026-04-05","issueDate":"2026-04-05","issueFile":"issues/2026-04-05.html","section":"供应链","sectionAnchor":"sec-supply","sectionName":"🔗 供应链动态","title":"AI算力供应链全线紧绷：H100 GPU租价5个月飙升40%","body":"SemiAnalysis 4月2日报告：H100一年期租约从2025年10月<strong>$1.70/GPU/h</strong>升至2026年3月<strong>$2.35</strong>，涨幅<strong>40%</strong>。DDR5合同价Q1同比涨近<strong>5倍</strong>。按需算力全线售罄，Blackwell集群交期延至2026年6-7月。Neocloud掌握议价权，可争取更高预付款和更长合约。","insight":"供应链全线紧绷标志AI算力进入真正卖方市场，DC运营商议价权翻转。","sourceLabel":"华尔街见闻/SemiAnalysis","sourceUrl":"https://wallstreetcn.com/articles/3769129","tags":["H100","40%","SemiAnalysis","卖方市场"]},

  {issueId:"2026-04-04",issueDate:"2026-04-04",issueFile:"issues/2026-04-04.html",section:"重大",sectionAnchor:"sec-signal",sectionName:"🔥 重大信号",title:"Meta德州数据中心投资翻倍至100亿美元，目标容量1GW",body:"Meta将其位于德克萨斯州埃尔帕索的数据中心投资额大幅提升至100亿美元，目标容量1GW，预计2028年前投入运营。这是Meta目前最大的单体数据中心项目。",insight:"单体项目百亿美元级投资成为常态，反映超大规模玩家在AI基础设施上的军备竞赛加速。",sourceLabel:"Data Center Knowledge",sourceUrl:"https://www.datacenterknowledge.com/data-center-construction/new-data-center-developments-april-2026",tags:["Meta","100亿美元","1GW","德克萨斯"]},
  {issueId:"2026-04-04",issueDate:"2026-04-04",issueFile:"issues/2026-04-04.html",section:"重大",sectionAnchor:"sec-signal",sectionName:"🔥 重大信号",title:"全球超大规模企业资本支出滚动增长至7000亿美元",body:"Nebius芬兰100亿美元、Oracle密歇根160亿美元、DayOne马来西亚280亿美元等项目持续落地。行业资本支出以GW为单位计量，传统枢纽容量见顶推动投资向东南亚和美国二级市场转移。Oracle裁员数千人同时斥巨资建基础设施。",insight:"数据中心投资已进入万亿美元时代，能源优先取代光纤优先成为选址第一原则。",sourceLabel:"LinkedIn行业周报",sourceUrl:"https://www.linkedin.com/pulse/weekly-data-center-industry-news-first-weeks-april-2026-kim-lwpqf",tags:["7000亿","资本支出","Nebius","Oracle","DayOne"]},

  {issueId:"2026-04-04",issueDate:"2026-04-04",issueFile:"issues/2026-04-04.html",section:"技术",sectionAnchor:"sec-tech",sectionName:"⚡ 技术趋势",title:"华创证券：2026年为液冷放量元年，风冷已达技术瓶颈",body:"华创证券发布AIDC系列深度报告，单机柜功率从3-8kW飙升至20-100kW，风冷三种方案均达天花板。冷板式液冷PUE降至1.15以下，Rubin平台下半年量产推动全液冷标配。全球CDU市场预计2031年达251.7亿元。",insight:"液冷从可选变必选，CDU供需将持续紧张贯穿全年。",sourceLabel:"华创证券研报",sourceUrl:"https://stock.finance.sina.com.cn/stock/go.php/vReport_Show/kind/industry/rptid/828204753319/index.phtml",tags:["液冷","CDU","Rubin","PUE","华创证券"]},
  {issueId:"2026-04-04",issueDate:"2026-04-04",issueFile:"issues/2026-04-04.html",section:"技术",sectionAnchor:"sec-tech",sectionName:"⚡ 技术趋势",title:"储能正式接管AIDC电力稳定性，2030年全球需求超300GWh",body:"ESIE 2026峰会上南都电源成立独立AIDC部门发布10C超高倍率AIOn X-rate系统；天合储能联合科华数能发布AIDC全域融合方案；晶科能源发布全场景光储方案。机构预计2030年全球AIDC储能装机需求超300GWh。",insight:"储能从辅助电源升级为AIDC核心基础设施，运营商需重新评估供电架构。",sourceLabel:"新京报/ESIE 2026",sourceUrl:"https://news.qq.com/rain/a/20260403A05FBQ00",tags:["储能","300GWh","AIDC","南都电源","ESIE"]},
  {issueId:"2026-04-04",issueDate:"2026-04-04",issueFile:"issues/2026-04-04.html",section:"技术",sectionAnchor:"sec-tech",sectionName:"⚡ 技术趋势",title:"爱尔兰Pure DC建成欧洲首个110MW数据中心微电网",body:"Pure DC在都柏林建成110MW数据中心微电网为欧洲首创，旨在绕过电网容量限制。Echelon计划建设首个绿色能源园，将数据中心与800MW海上风电并置。",insight:"微电网方案已进入商用验证阶段，对电网受限区域的IDC建设具有参考价值。",sourceLabel:"Data Center Knowledge",sourceUrl:"https://www.datacenterknowledge.com/data-center-construction/new-data-center-developments-april-2026",tags:["微电网","110MW","爱尔兰","Pure DC"]},
  {issueId:"2026-04-04",issueDate:"2026-04-04",issueFile:"issues/2026-04-04.html",section:"政策",sectionAnchor:"sec-policy",sectionName:"📜 政策法规",title:"澳大利亚推出国家数据中心审批框架",body:"澳大利亚工党政府引入国家级框架，将数据中心审批与能源投资、资源管理和经济影响挂钩。国家重建基金向Macquarie提供2亿澳元支持主权云和数据中心扩张。",insight:"能源优先正从企业策略上升为国家政策导向，将数据中心审批制度化。",sourceLabel:"Data Center Knowledge",sourceUrl:"https://www.datacenterknowledge.com/data-center-construction/new-data-center-developments-april-2026",tags:["澳大利亚","审批框架","主权云","能源优先"]},
  {issueId:"2026-04-04",issueDate:"2026-04-04",issueFile:"issues/2026-04-04.html",section:"政策",sectionAnchor:"sec-policy",sectionName:"📜 政策法规",title:"美国社区反对加剧：缅因州拟暂停建设，弗吉尼亚州项目被法院阻止",body:"Amazon俄勒冈州支付2050万美元污染和解金；缅因州拟议暂停数据中心建设；弗吉尼亚州项目被法院叫停。民调显示民众对数据中心接受度低于亚马逊仓库。",insight:"NIMBY运动正从个案升级为系统性法律对抗，将显著增加北美IDC项目的时间和合规成本。",sourceLabel:"aitoolly/LinkedIn",sourceUrl:"https://aitoolly.com/zh/ai-news/article/2026-04-04-public-sentiment-shift-why-communities-prefer-amazon-warehouses-over-modern-data-centers",tags:["NIMBY","美国","缅因州","弗吉尼亚","社区反对"]},
  {issueId:"2026-04-04",issueDate:"2026-04-04",issueFile:"issues/2026-04-04.html",section:"供应链",sectionAnchor:"sec-supply",sectionName:"🔗 供应链动态",title:"燃气轮机成本飙升195%，能源设备供需矛盾加剧",body:"受数据中心电力需求爆发影响，美国市场燃气轮机成本较一年前飙升195%。Google等被迫转向天然气发电厂。Microsoft与Chevron在德克萨斯州达成独家能源合作。",insight:"电力基础设施设备严重紧张，能源优先已取代光纤优先成为选址第一原则。",sourceLabel:"LinkedIn行业周报",sourceUrl:"https://www.linkedin.com/pulse/weekly-data-center-industry-news-first-weeks-april-2026-kim-lwpqf",tags:["燃气轮机","195%","能源","Chevron","Microsoft"]},
  {issueId:"2026-04-04",issueDate:"2026-04-04",issueFile:"issues/2026-04-04.html",section:"供应链",sectionAnchor:"sec-supply",sectionName:"🔗 供应链动态",title:"全球数据中心IT电力需求2026年将翻倍至96GW",body:"AIDC深度报告：全球算力总规模达4495 EFlops（同比+117%），智能算力占比85%。2023-2026年全球DC核心IT电力从49GW翻倍至96GW，智算中心贡献约40GW。",insight:"算力需求爆发式增长对GPU、液冷设备、配电系统的供应链形成持续压力。",sourceLabel:"华创证券AIDC报告",sourceUrl:"https://www.sohu.com/a/1004387494_121123901",tags:["96GW","4495 EFlops","智能算力","供应链"]},
  {issueId:"2026-04-04",issueDate:"2026-04-04",issueFile:"issues/2026-04-04.html",section:"招投标",sectionAnchor:"sec-bid",sectionName:"📋 招投标公告",title:"青海德令哈智算中心二期3号数据中心中标，总投资58.5亿元",body:"中铁二十四局以约15亿元中标青海德令哈智算中心项目（二期）3号数据中心PC施工总承包。项目总投资约58.5亿元，规划建设300个高密机柜，利用高原冷空气自然冷却降温，按国标A（T3+）标准建设。",insight:"西部东数西算枢纽节点算力基建持续推进，高原自然冷源+绿电优势使青海成为低PUE数据中心理想选址。",sourceLabel:"青海招标投标信息网",sourceUrl:"https://www.sohu.com/a/1001094367_121123899",tags:["德令哈","58.5亿","中铁二十四局","东数西算"]},
  {issueId:"2026-04-04",issueDate:"2026-04-04",issueFile:"issues/2026-04-04.html",section:"观点",sectionAnchor:"sec-quote",sectionName:"👀 人物与观点",title:"华创证券：2026年是液冷放量元年，Rubin量产推动全液冷标配",body:"华创证券机械团队：风冷已达技术瓶颈，冷板式液冷PUE可降至1.15以下，相比风冷的1.4+有质的飞跃。随着NVIDIA Rubin平台下半年量产，全液冷架构将成为AIDC标配。",insight:"首次明确提出液冷放量元年判断，对液冷产业链具有重要参考价值。",sourceLabel:"华创证券研报",sourceUrl:"https://stock.finance.sina.com.cn/stock/go.php/vReport_Show/kind/industry/rptid/828204753319/index.phtml",tags:["液冷放量元年","华创证券","Rubin","PUE"]},

// ══════════════════════════════════════════════
// THEME
// ══════════════════════════════════════════════
function getTheme() { return localStorage.getItem('idc-theme') || 'light'; }

function toggleTheme() {
  var next = getTheme() === 'dark' ? 'light' : 'dark';
  if (next === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
  } else {
    document.documentElement.removeAttribute('data-theme');
  }
  localStorage.setItem('idc-theme', next);
  document.getElementById('themeBtn').textContent = next === 'dark' ? '🌙' : '☀️';
}

(function() {
  var t = getTheme();
  document.getElementById('themeBtn').textContent = t === 'dark' ? '🌙' : '☀️';
})();

// ══════════════════════════════════════════════
// TAB SWITCHING
// ══════════════════════════════════════════════
function switchTab(viewId) {
  document.querySelectorAll('.view').forEach(function(v) { v.classList.remove('active'); });
  document.querySelectorAll('.tab-item').forEach(function(t) { t.classList.remove('active'); });
  document.getElementById(viewId).classList.add('active');
  document.querySelector('.tab-item[data-view="' + viewId + '"]').classList.add('active');
  window.scrollTo(0, 0);
}

// ══════════════════════════════════════════════
// RENDER: Latest Issue Hero
// ══════════════════════════════════════════════
function renderLatestHero() {
  if (ISSUES.length === 0) return;
  var latest = ISSUES[0];
  var tagsHtml = latest.tags.map(function(t) { return '<span class="hero-tag">' + t + '</span>'; }).join('');
  document.getElementById('latestHero').innerHTML =
    '<div class="latest-hero-title">' + latest.title + '</div>' +
    '<div class="latest-hero-meta">' + latest.dateRange + ' · ' + latest.intelCount + ' 条情报 · ¥' + latest.totalAmount + '</div>' +
    '<div class="latest-hero-tags">' + tagsHtml + '</div>';
}

// ══════════════════════════════════════════════
// RENDER: Section Nav (horizontal pills)
// ══════════════════════════════════════════════
var activeSec = '全部';

function renderSecNav() {
  if (ISSUES.length === 0) return;
  var latest = ISSUES[0];
  var items = INTEL_ITEMS.filter(function(i) { return i.issueId === latest.id; });

  // Get unique sections in order
  var sectionOrder = ['全部','重大','项目','技术','政策','供应链','观点','招投标','数据'];
  var existingSections = {};
  items.forEach(function(i) { existingSections[i.section] = true; });

  var navHtml = '';
  sectionOrder.forEach(function(sec) {
    if (sec !== '全部' && !existingSections[sec]) return;
    var count = sec === '全部' ? items.length : items.filter(function(i) { return i.section === sec; }).length;
    var cls = activeSec === sec ? ' active' : '';
    navHtml += '<button class="sec-nav-item' + cls + '" data-sec="' + sec + '" onclick="filterSection(\'' + sec + '\')">' +
      sec + (sec !== '全部' ? ' ' + count : '') + '</button>';
  });
  document.getElementById('secNav').innerHTML = navHtml;
}

function filterSection(sec) {
  activeSec = sec;
  renderSecNav();
  renderIntelList(currentQuery);
}

// ══════════════════════════════════════════════
// RENDER: Intel List (cards)
// ══════════════════════════════════════════════
function highlightText(text, query) {
  if (!query) return text;
  var escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp('(' + escaped + ')', 'gi'), '<mark>$1</mark>');
}

function renderIntelList(query) {
  var items = INTEL_ITEMS;
  if (ISSUES.length > 0 && !query) {
    items = INTEL_ITEMS.filter(function(i) { return i.issueId === ISSUES[0].id; });
  }

  // Filter by section
  if (activeSec !== '全部') {
    items = items.filter(function(i) { return i.section === activeSec; });
  }

  // Filter by search query
  if (query) {
    var lower = query.toLowerCase();
    items = items.filter(function(i) {
      return i.title.toLowerCase().indexOf(lower) !== -1 ||
        i.body.toLowerCase().indexOf(lower) !== -1 ||
        i.tags.some(function(t) { return t.toLowerCase().indexOf(lower) !== -1; }) ||
        i.section.toLowerCase().indexOf(lower) !== -1;
    });
  }

  var noResults = document.getElementById('noResults');
  var searchCount = document.getElementById('searchCount');

  if (items.length === 0) {
    document.getElementById('intelList').innerHTML = '';
    noResults.style.display = 'block';
    document.getElementById('noResultsText').textContent = query ? '没有找到包含「' + query + '」的情报' : '该板块暂无情报';
    searchCount.textContent = '';
    return;
  }

  noResults.style.display = 'none';
  if (query) {
    searchCount.textContent = '找到 ' + items.length + ' 条相关情报';
  } else {
    searchCount.textContent = '';
  }

  document.getElementById('intelList').innerHTML = items.map(function(item, idx) {
    var titleHtml = highlightText(item.title, query);
    var bodyHtml = highlightText(item.body, query);
    var insightHtml = item.insight
      ? '<div class="m-insight">💡 ' + item.insight + '</div>' : '';
    var sourceHtml = '';
    if (item.sourceUrl) {
      sourceHtml = '<div class="m-source">📎 <a href="' + item.sourceUrl + '" target="_blank">' + item.sourceLabel + '</a></div>';
    } else if (item.sourceLabel) {
      sourceHtml = '<div class="m-source">📎 ' + item.sourceLabel + '</div>';
    }
    var tagsHtml = item.tags.slice(0, 4).map(function(t) { return '<span class="m-tag">' + t + '</span>'; }).join('');

    return '<div class="m-card">' +
      '<div class="m-card-top">' +
        '<span class="m-badge badge-' + item.section + '">' + item.section + '</span>' +
        '<div class="m-title">' + titleHtml + '</div>' +
      '</div>' +
      '<div class="m-body collapsed" id="body-' + idx + '">' + bodyHtml + '</div>' +
      '<div class="m-expand" id="expand-' + idx + '" onclick="toggleExpand(' + idx + ')">展开全文 ▾</div>' +
      insightHtml +
      '<div class="m-footer">' +
        sourceHtml +
        '<div class="m-tags">' + tagsHtml + '</div>' +
      '</div>' +
    '</div>';
  }).join('');

  // Check which cards need expand button
  setTimeout(function() {
    items.forEach(function(_, idx) {
      var body = document.getElementById('body-' + idx);
      var expand = document.getElementById('expand-' + idx);
      if (body && expand && body.scrollHeight > body.clientHeight + 4) {
        expand.style.display = 'block';
      }
    });
  }, 50);
}

function toggleExpand(idx) {
  var body = document.getElementById('body-' + idx);
  var expand = document.getElementById('expand-' + idx);
  if (body.classList.contains('collapsed')) {
    body.classList.remove('collapsed');
    expand.textContent = '收起 ▴';
  } else {
    body.classList.add('collapsed');
    expand.textContent = '展开全文 ▾';
  }
}

// ══════════════════════════════════════════════
// RENDER: Issues List
// ══════════════════════════════════════════════
function renderIssuesList() {
  var months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  document.getElementById('issuesList').innerHTML = ISSUES.map(function(issue) {
    var d = new Date(issue.date + 'T00:00:00');
    return '<a class="m-issue" href="' + issue.file + '">' +
      '<div class="m-issue-date">' +
        '<div class="m-issue-month">' + months[d.getMonth()] + '</div>' +
        '<div class="m-issue-day">' + d.getDate() + '</div>' +
      '</div>' +
      '<div class="m-issue-info">' +
        '<div class="m-issue-title">' + issue.title + '</div>' +
        '<div class="m-issue-meta">' +
          '<span class="m-issue-tag tag-intel">' + issue.intelCount + ' 条</span>' +
          '<span class="m-issue-tag tag-amount">¥' + issue.totalAmount + '</span>' +
        '</div>' +
      '</div>' +
      '<span class="m-issue-arrow">›</span>' +
    '</a>';
  }).join('');
}

// ══════════════════════════════════════════════
// RENDER: Stats
// ══════════════════════════════════════════════
function renderStats() {
  // Count sections
  var sectionCounts = {};
  INTEL_ITEMS.forEach(function(i) {
    sectionCounts[i.section] = (sectionCounts[i.section] || 0) + 1;
  });

  // Collect all tags
  var tagCounts = {};
  INTEL_ITEMS.forEach(function(i) {
    i.tags.forEach(function(t) {
      tagCounts[t] = (tagCounts[t] || 0) + 1;
    });
  });
  var sortedTags = Object.keys(tagCounts).sort(function(a, b) { return tagCounts[b] - tagCounts[a]; });

  var html = '';

  // Stats grid
  html += '<div class="stats-grid">';
  html += '<div class="stat-card"><div class="num" style="color:var(--blue);">' + ISSUES.length + '</div><div class="label">已发布期刊</div></div>';
  html += '<div class="stat-card"><div class="num" style="color:var(--purple);">' + INTEL_ITEMS.length + '</div><div class="label">累计情报</div></div>';
  html += '<div class="stat-card"><div class="num" style="color:var(--green);">8</div><div class="label">覆盖板块</div></div>';
  html += '<div class="stat-card"><div class="num" style="color:var(--orange);">' + sortedTags.length + '</div><div class="label">标签数</div></div>';
  html += '</div>';

  // Section breakdown
  html += '<div class="stats-section-title">📊 板块分布</div>';
  html += '<div style="margin-bottom:20px;">';
  var sectionNames = {'重大':'🔴 重大信号','项目':'🏗️ 项目与市场','技术':'⚙️ 技术趋势','政策':'📜 政策法规','供应链':'🔗 供应链','观点':'💬 观点','招投标':'📋 招投标','数据':'📈 数据'};
  Object.keys(sectionCounts).forEach(function(sec) {
    var pct = Math.round(sectionCounts[sec] / INTEL_ITEMS.length * 100);
    html += '<div style="margin-bottom:8px;">';
    html += '<div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px;">';
    html += '<span>' + (sectionNames[sec] || sec) + '</span>';
    html += '<span style="color:var(--text3);">' + sectionCounts[sec] + ' 条 · ' + pct + '%</span>';
    html += '</div>';
    html += '<div style="height:6px;background:var(--border);border-radius:3px;overflow:hidden;">';
    html += '<div style="height:100%;width:' + pct + '%;background:var(--blue);border-radius:3px;transition:width .3s;"></div>';
    html += '</div>';
    html += '</div>';
  });
  html += '</div>';

  // Tag cloud
  html += '<div class="stats-section-title">🏷️ 热门标签</div>';
  html += '<div class="tag-cloud">';
  sortedTags.slice(0, 24).forEach(function(tag) {
    html += '<span class="tag-cloud-item" onclick="tagSearch(\'' + tag.replace(/'/g, "\\'") + '\')">' + tag + ' <span style="color:var(--text3);font-size:11px;">' + tagCounts[tag] + '</span></span>';
  });
  html += '</div>';

  document.getElementById('statsWrap').innerHTML = html;
}

function tagSearch(tag) {
  switchTab('viewLatest');
  document.getElementById('searchInput').value = tag;
  onSearch();
}

// ══════════════════════════════════════════════
// SEARCH
// ══════════════════════════════════════════════
var currentQuery = '';

function onSearch() {
  var q = document.getElementById('searchInput').value.trim();
  currentQuery = q;
  var clear = document.getElementById('searchClear');
  clear.style.display = q ? 'flex' : 'none';

  if (!q) {
    activeSec = '全部';
    renderSecNav();
    document.getElementById('latestHero').parentElement.querySelector('.latest-hero') && (document.getElementById('latestHero').style.display = '');
    document.getElementById('secNav').style.display = '';
  } else {
    document.getElementById('latestHero').style.display = 'none';
  }

  renderIntelList(q);
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  currentQuery = '';
  document.getElementById('searchClear').style.display = 'none';
  document.getElementById('searchCount').textContent = '';
  document.getElementById('latestHero').style.display = '';
  document.getElementById('secNav').style.display = '';
  activeSec = '全部';
  renderSecNav();
  renderIntelList('');
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
renderLatestHero();
renderSecNav();
renderIntelList('');
renderIssuesList();
renderStats();
</script>
</body>
